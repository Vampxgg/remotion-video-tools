    - data:
        code: "# -*- coding: utf-8 -*-\nfrom typing import Any, List, Dict, Union\n\
          from copy import deepcopy\n\ndef get_default_web_queries_structure() ->\
          \ Dict[str, Any]:\n    \"\"\"\n    定义并返回 web_queries 的默认模板结构。\n    \"\"\"\
          \n    return {\n        \"comprehensive_query\": [],\n        \"career_query\"\
          : {},\n        \"tianyan_check_enterprise\": \"\"\n    }\n\ndef main(input_array:\
          \ List[Dict[str, Any]]) -> Dict[str, List[Dict[str, Any]]]:\n    \"\"\"\n\
          \    一个真正健壮且通用的查询任务分发器。\n    它能正确处理 web_queries 为字典、列表或不存在等多种情况，\n    并将\
          \ hybrid_queries 智能地合并进去。\n    \"\"\"\n    local_queries_output = []\n \
          \   web_queries_output = []\n\n    if not isinstance(input_array, list)\
          \ or not input_array:\n        return {\"local_output\": [], \"web_output\"\
          : []}\n\n    try:\n        # 动态ID识别逻辑保持不变，它本身是健壮的\n        first_item_keys\
          \ = list(input_array[0].keys())\n        known_data_keys = {'local_queries',\
          \ 'web_queries', 'hybrid_queries'}\n        id_key = next((key for key in\
          \ first_item_keys if key not in known_data_keys), \"id\") # 默认 'id'\n  \
          \  except (IndexError, AttributeError):\n        return {\"local_output\"\
          : [], \"web_output\": []}\n\n    for item in input_array:\n        id_value\
          \ = item.get(id_key)\n        \n        local_queries = item.get(\"local_queries\"\
          ) or []\n        web_queries = item.get(\"web_queries\")\n        hybrid_queries\
          \ = item.get(\"hybrid_queries\") or []\n\n        # --- 1. Local Queries\
          \ (逻辑不变) ---\n        final_local_queries = list(dict.fromkeys(local_queries\
          \ + hybrid_queries))\n        local_obj = {id_key: id_value, \"local_queries\"\
          : final_local_queries}\n        local_queries_output.append(local_obj)\n\
          \n        # --- 2. Web Queries (【核心修正】采用更精细的逻辑分支) ---\n        \n      \
          \  base_web_structure: Dict[str, Any]\n\n        # 步骤 A: 根据 web_queries\
          \ 的真实类型，确定基础结构\n        if isinstance(web_queries, dict):\n            #\
          \ 情况1: web_queries 是一个字典，直接作为模板基础\n            print(f\"[{id_value}] Web\
          \ queries type: dict. Using as base.\")\n            base_web_structure\
          \ = deepcopy(web_queries)\n        \n        elif isinstance(web_queries,\
          \ list):\n            # 【关键修正】情况2: web_queries 是一个列表\n            # 创建默认模板，并将列表内容填充到\
          \ 'comprehensive_query'\n            print(f\"[{id_value}] Web queries type:\
          \ list. Populating default structure.\")\n            base_web_structure\
          \ = get_default_web_queries_structure()\n            # 使用去重后的 web_queries\
          \ 列表填充\n            base_web_structure[\"comprehensive_query\"] = list(dict.fromkeys(web_queries))\n\
          \            \n        else:\n            # 情况3: web_queries 是 None 或其他类型，视为缺失\n\
          \            # 直接创建一个空的默认模板\n            print(f\"[{id_value}] Web queries\
          \ is missing or invalid type. Creating default structure.\")\n         \
          \   base_web_structure = get_default_web_queries_structure()\n\n       \
          \ # 步骤 B: 将 hybrid_queries 智能合并到已确定的基础结构中\n        target_key = \"comprehensive_query\"\
          \n        # 确保目标字段存在且为列表类型，再进行合并\n        if target_key in base_web_structure\
          \ and isinstance(base_web_structure.get(target_key), list):\n          \
          \  existing_queries = base_web_structure[target_key]\n            # 合并 hybrid_queries\
          \ 并去重\n            base_web_structure[target_key] = list(dict.fromkeys(existing_queries\
          \ + hybrid_queries))\n\n        # 步骤 C: 构建最终输出对象\n        web_obj = {id_key:\
          \ id_value, \"web_queries\": base_web_structure}\n        web_queries_output.append(web_obj)\n\
          \n    return {\n        \"local_output\": local_queries_output,\n      \
          \  \"web_output\": web_queries_output\n    }"
        code_language: python3
