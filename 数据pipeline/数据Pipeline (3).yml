          \            return self.active_instances[p_name]\n        # 检查是否是 Web Provider\n\
          \        if p_name in self.web_provider_classes:\n            print(f\"\U0001F50C\
          \ [System] Initializing WEB provider: {p_name}...\")\n            instance\
          \ = self.web_provider_classes[p_name]()\n            self.active_instances[p_name]\
          \ = instance\n            return instance\n\n        # 检查是否是 辅助 Provider\n\
          \        elif p_name in self.auxiliary_provider_classes:\n            print(f\"\
          \U0001F50C [System] Initializing AUX provider: {p_name}...\")\n        \
          \    instance = self.auxiliary_provider_classes[p_name]()\n            self.active_instances[p_name]\
          \ = instance\n            return instance\n\n        else:\n           \
          \ raise ValueError(f\"Provider '{p_name}' not supported.\")\n\n    # 暴露给外部调用的特定\
          \ getter，确保类型安全和懒加载触发\n    def get_zhilian_provider(self) -> ZhiLianJobProvider:\n\
          \        return self._get_provider_instance(\"zhilian_job\")\n\n    def\
          \ get_tianyan_provider(self) -> TianyanCheckProvider:\n        return self._get_provider_instance(\"\
          tianyan_check_enterprises\")\n\n    async def web_search(self, queries:\
          \ List[str], providers_to_use: List[str], client: httpx.AsyncClient,\n \
          \                        search_types: List[str], web_results_per_type:\
          \ int, video_results_count: int,\n                         regional_data:\
          \ Optional[Dict[str, str]] = None,\n                         time_filter:\
          \ Optional[Dict[str, str]] = None\n                         ) -> List[Dict[str,\
          \ Any]]:\n        # ... [这里的轮询调度逻辑保持不变] ...\n        async def search_and_tag(p_name:\
          \ str, original_query: str, num: int, stype: str, is_regional: bool):\n\
          \            provider = self._get_provider_instance(p_name)\n          \
          \  filtered_query = _build_filtered_query(original_query, stype, regional_data=regional_data,\n\
          \                                                   use_regional_patterns=is_regional,\n\
          \                                                   time_filter=time_filter)\n\
          \            # 打不同的日志 tag 方便区分\n            log_tag = \"Regional\" if is_regional\
          \ else \"Standard\"\n            print(\n                f\"  -> [Task Scheduled]\
          \ Provider: {p_name}, [Task: {stype} | {log_tag}], Results: {num}, Query:\
          \ \\\"{filtered_query}\\\"\")\n            try:\n                data =\
          \ await provider.search(filtered_query, client, num, stype)\n          \
          \      # 在返回结果中明确标记原始查询和搜索类型\n                return {\"original_query\"\
          : original_query, \"search_type\": stype, \"provider\": p_name, \"data\"\
          : data}\n            except Exception as e:\n                error_data\
          \ = [\n                    provider._prefix_keys({\"type\": stype, \"error\"\
          : f\"Task failed for '{original_query}': {e}\"},\n                     \
          \                     provider.prefix)]\n                return {\"original_query\"\
          : original_query, \"search_type\": stype, \"provider\": p_name, \"data\"\
          : error_data}\n\n        provider_cycle = cycle(providers_to_use)\n    \
          \    tasks = []\n        # 为每个 query 和每个 search_type 创建任务\n        for query\
          \ in queries:\n            for stype in search_types:\n                assigned_provider\
          \ = next(provider_cycle)\n\n                # 【解耦】&【优化】逻辑\n            \
          \    num_results_for_task = 0\n                if stype == 'video':\n  \
          \                  num_results_for_task = video_results_count\n        \
          \        else:  # 'web', 'industry_reports', etc.\n                    num_results_for_task\
          \ = web_results_per_type\n\n                # 【优化】如果请求的结果数为0，则直接跳过，不创建任务\n\
          \                if num_results_for_task <= 0:\n                    print(f\"\
          \  -> [Task Skipped] Type: {stype} requested 0 results for query: \\\"{query}\\\
          \"\")\n                    continue\n\n                strategy_config =\
          \ SEARCH_STRATEGY_CONFIG.get(stype, {})\n\n                # --- 任务 A: 标准检索\
          \ (永远执行) ---\n                tasks.append(search_and_tag(\n           \
          \         assigned_provider,\n                    query,\n             \
          \       num_results_for_task,\n                    stype,\n            \
          \        is_regional=False\n                ))\n                # --- 任务\
          \ B: 区域性检索 (条件触发) ---\n                # 只有当：不是视频搜索 + 提供了区域数据 + 该类型配置了 regional_patterns\
          \ 时才执行\n                if (stype != 'video' and\n                     \
          \   regional_data and\n                        \"regional_patterns\" in\
          \ strategy_config):\n                    print(f\"  -> [System] Detected\
          \ regional data for {stype}, spawning extra regional task.\")\n        \
          \            tasks.append(search_and_tag(\n                        assigned_provider,\n\
          \                        query,\n                        num_results_for_task,\n\
          \                        stype,\n                        is_regional=True\n\
          \                    ))\n\n        if not tasks: return []  # 如果没有任务，直接返回\n\
          \        task_results = await asyncio.gather(*tasks)\n\n        # 聚合结果\n\
          \        # 新的聚合结构: { \"query_string\": { \"type_A_results\": [], \"type_B_results\"\
          : [], \"errors\": [] } }\n        agg_by_query = {q: {\"query\": q, \"errors\"\
          : []} for q in queries}\n        for res in task_results:\n            original_query\
          \ = res[\"original_query\"]\n            stype = res[\"search_type\"]\n\
          \            p_name = res[\"provider\"]\n            data = res[\"data\"\
          ]\n\n            provider_instance = self._get_provider_instance(p_name)\n\
          \            provider_prefix = getattr(provider_instance, 'prefix', p_name)\n\
          \n            # 初始化该类型的结果列表 (例如: \"industry_reports_results\")\n       \
          \     results_key = f\"{stype}_results\"\n            if results_key not\
          \ in agg_by_query[original_query]:\n                agg_by_query[original_query][results_key]\
          \ = []\n            for item in data:\n                if item.get(f'{provider_prefix}_error'):\n\
          \                    agg_by_query[original_query][\"errors\"].append(item[f'{provider_prefix}_error'])\n\
          \                else:\n                    agg_by_query[original_query][results_key].append(item)\n\
          \n        return list(agg_by_query.values())\n\n\n# --- 5. Dify 异步主函数 (总指挥)\
          \ ---\nEXCLUSIVE_SEARCH_RESULTS_COUNT = 10\n\n\nasync def _process_single_item(\n\
          \        raw_item_input: Any,\n        searcher: MultiSourceSearcher,\n\
          \        client: httpx.AsyncClient,\n        web_search_providers_to_use:\
          \ List[str],\n        effective_search_types: List[str],\n        is_exclusive_requested:\
          \ bool,\n        exclusive_queries: List[str],\n        web_results_per_type:\
          \ int,\n        video_results_count: int,\n        is_zhilian_requested:\
          \ bool,\n        is_tianyan_requested: bool,\n        regional_data: Optional[Dict[str,\
          \ str]] = None,\n        time_filter: Optional[Dict[str, str]] = None\n\
          ) -> Dict[str, Any]:\n    \"\"\"\n    处理单个输入项的搜索任务\n    \"\"\"\n    # 1.\
          \ 解析输入\n    parsed_data = _intelligent_input_parser(raw_item_input)\n  \
          \  comprehensive_queries = parsed_data[\"comprehensive_queries\"]\n    career_query_data\
          \ = parsed_data[\"career_query_data\"]\n    tianyan_enterprise_names = parsed_data[\"\
          tianyan_enterprise_names\"]\n\n    # 2. 初始化结果容器\n    comprehensive_results\
          \ = []\n    career_results = {}\n    tianyan_results: List[str] = []\n\n\
          \    # 3. 执行Web搜索\n    if web_search_providers_to_use:\n        async_tasks\
          \ = []\n        # 3.1 创建普通查询任务\n        if comprehensive_queries:\n    \
          \        normal_task = searcher.web_search(\n                queries=comprehensive_queries,\n\
          \                providers_to_use=web_search_providers_to_use,\n       \
          \         client=client,\n                search_types=effective_search_types,\n\
          \                web_results_per_type=web_results_per_type,\n          \
          \      video_results_count=video_results_count,\n                regional_data=regional_data,\n\
          \                time_filter=time_filter\n            )\n            async_tasks.append(normal_task)\n\
          \n        # 3.2 创建专属查询任务\n        if is_exclusive_requested and exclusive_queries:\n\
          \            exclusive_task = searcher.web_search(\n                queries=exclusive_queries,\n\
          \                providers_to_use=web_search_providers_to_use,\n       \
          \         client=client,\n                search_types=[\"exclusive_rules\"\
          ],\n                web_results_per_type=EXCLUSIVE_SEARCH_RESULTS_COUNT,\n\
          \                video_results_count=0,\n                time_filter=time_filter\n\
          \            )\n            async_tasks.append(exclusive_task)\n\n     \
          \   # 3.3 并发执行\n        if async_tasks:\n            all_results_groups\
          \ = await asyncio.gather(*async_tasks)\n            for result_group in\
          \ all_results_groups:\n                comprehensive_results.extend(result_group)\n\
          \n    # 4. 执行ZhiLian数据提取\n    if is_zhilian_requested:\n        career_results\
          \ = searcher.get_zhilian_provider().get_data(career_query_data)\n\n    #\
          \ 5. 执行Tianyan数据提取\n    if is_tianyan_requested:\n        tianyan_results\
          \ = searcher.get_tianyan_provider().get_data(tianyan_enterprise_names)\n\
          \n    return {\n        \"comprehensive_data\": comprehensive_results,\n\
          \        \"career_data\": career_results,\n        \"tianyan_check_data\"\
          : tianyan_results\n    }\n\n\nasync def main_async(raw_input: Any, provider_selection:\
          \ Union[str, List[str]], search_types: List[str],\n                    \
          \ web_results_per_type: int, video_results_count: int,\n               \
