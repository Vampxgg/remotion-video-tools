          \ = results[1]\n    #         if doc_meta:\n    #             self.doc_meta_cache[(db_id,\
          \ doc_id)] = doc_meta\n    #\n    #     # 安全取值\n    #     doc_name = doc_meta.get(\"\
          name\", \"Unknown\") if doc_meta else \"Unknown\"\n    #     doc_metadata_dict\
          \ = doc_meta.get(\"doc_metadata\") or doc_meta.get(\"metadata\") or {}\n\
          \    #\n    #     # 3. 排序分段 (保证阅读顺序)\n    #     all_segments.sort(key=lambda\
          \ x: x.get('position', float('inf')))\n    #\n    #     # 4. 构造 Content\
          \ Blocks\n    #     content_blocks = [\n    #         {\n    #         \
          \    \"position\": s.get(\"position\"),\n    #             \"content\":\
          \ s.get(\"content\", \"\"),\n    #             \"score\": None  # 全文档默认满分，表示是硬性指定的\n\
          \    #         }\n    #         for s in all_segments\n    #     ]\n   \
          \ #\n    #     # 5. 【关键】返回标准化结构 (Standardized Schema)\n    #     # 这就是必须放入\
          \ retrieve_data 里的那个对象\n    #     return {\n    #         \"database_id\"\
          : db_id,\n    #         \"document_infos\": [\n    #             {\n   \
          \ #                 \"doc_metadata\": doc_metadata_dict,\n    #        \
          \         \"document_id\": doc_id,\n    #                 \"document_name\"\
          : doc_name,\n    #                 \"source_type\": \"document\",  # 区别于\
          \ 'excerpt'\n    #                 \"content_blocks\": content_blocks\n\
          \    #             }\n    #         ]\n    #     }\n\n    async def process_full_document_task(self,\
          \ task: Dict) -> Dict:\n        \"\"\"\n        处理全文档任务 (适配多模态)。\n     \
          \   \"\"\"\n        db_id = task.get(\"database_id\")\n        doc_id =\
          \ task.get(\"document_id\")\n        print(db_id, doc_id)\n        # 1.\
          \ 获取元数据和全部分段\n        doc_meta_obj = self.doc_meta_cache.get((db_id, doc_id))\n\
          \        if not doc_meta_obj or doc_meta_obj.get(\"_source\") != \"api_detail\"\
          :\n            raw_detail = await self.api.fetch_document_detail(db_id,\
          \ doc_id)\n            if raw_detail:\n\n                raw_list = raw_detail.get(\"\
          doc_metadata\", [])\n                clean_meta = ContentFormatter.clean_metadata(raw_list)\n\
          \                # 补充 root level 信息\n                if \"doc_form\" in\
          \ raw_detail: clean_meta[\"doc_form\"] = raw_detail[\"doc_form\"]\n    \
          \            doc_meta_obj = {\n                    \"id\": raw_detail.get(\"\
          id\"),\n                    \"name\": raw_detail.get(\"name\"),\n      \
          \              \"doc_metadata\": clean_meta,\n                    \"_source\"\
          : \"full_detail\"\n                }\n                self.doc_meta_cache[(db_id,\
          \ doc_id)] = doc_meta_obj\n\n        all_segments = await self.api.fetch_all_segments(db_id,\
          \ doc_id)\n\n        # 安全检查\n        if not doc_meta_obj or not all_segments:\n\
          \            return {\n                \"database_id\": db_id,\n       \
          \         \"document_infos\": [{\n                    \"document_id\": doc_id,\n\
          \                    \"document_name\": \"Error: Not Found\",\n        \
          \            \"source_type\": \"error\",\n                    \"content_blocks\"\
          : []\n                }]\n            }\n\n        # 2. 转换为内部 chunk 结构\n\
          \        temp_chunks = [\n            {\"content\": s.get(\"content\"),\
          \ \"position\": s.get(\"position\"), \"score\": None,\n             \"document_id\"\
          : doc_id, \"database_id\": db_id, \"document_name\": doc_meta_obj.get(\"\
          name\")}\n            for s in all_segments\n        ]\n\n        # 3. 调用统一格式化器，并明确告知上下文是\
          \ 'full_doc'\n        document_info = ContentFormatter.format_document(temp_chunks,\
          \ doc_meta_obj, context='full_doc')\n        # 4. 返回标准结构\n        return\
          \ {\"database_id\": db_id, \"document_infos\": [document_info] if document_info\
          \ else []}\n\n    def format_output(self, chunks: List[Dict]) -> List[Dict]:\n\
          \        \"\"\"Stage 5: 格式化为 Dify 要求的 JSON 结构\"\"\"\n        grouped = defaultdict(lambda:\
          \ defaultdict(list))\n        for c in chunks:\n            grouped[c['database_id']][c['document_id']].append(c)\n\
          \n        formatted_sources = []\n        for db_id, docs_map in grouped.items():\n\
          \            doc_infos = []\n            for doc_id, chunk_list in docs_map.items():\n\
          \                if not chunk_list: continue\n                # # 按原文位置排序，方便阅读\n\
          \                # chunk_list.sort(key=lambda x: x.get('score', 0), reverse=True)\n\
          \n                # 从缓存读取元数据\n                meta = self.doc_meta_cache.get((db_id,\
          \ doc_id), {})\n\n                formatted_doc = ContentFormatter.format_document(chunk_list,\
          \ meta, context='rag')\n                if formatted_doc:\n            \
          \        doc_infos.append(formatted_doc)\n\n                # doc_meta_dict\
          \ = meta.get(\"doc_metadata\") or meta.get(\"metadata\") or {}\n       \
          \         # doc_infos.append({\n                #     \"doc_metadata\":\
          \ doc_meta_dict,\n                #     \"document_id\": doc_id,\n     \
          \           #     \"document_name\": chunk_list[0]['document_name'] or \"\
          Unknown\",\n                #     \"source_type\": \"excerpt\",\n      \
          \          #     \"content_blocks\": [\n                #         {\n  \
          \              #             \"content\": c[\"content\"],\n            \
          \    #             \"position\": c[\"position\"],\n                #   \
          \          \"score\": c[\"score\"]\n                #         } for c in\
          \ chunk_list\n                #     ]\n                # })\n\n        \
          \    if doc_infos:\n                formatted_sources.append({\n       \
          \             \"database_id\": db_id,\n                    \"document_infos\"\
          : doc_infos\n                })\n        return formatted_sources\n\n  \
          \  async def process_slide(self, query_group: Dict, execution_plan: List[Dict],\
          \ tasks: List[Dict]) -> Dict:\n        \"\"\"处理单页 PPT 逻辑：Retrieve -> RRF\
          \ -> Rerank -> Slice -> Format\"\"\"\n        # slide_id = slide_group.get(\"\
          slide_id\", \"unknown\")\n        queries = query_group.get(\"local_queries\"\
          , [])\n\n        result_object = query_group.copy()\n        if not queries:\n\
          \            result_object[\"retrieve_data\"] = []\n            return result_object\n\
          \n        print(f\"\U0001F449 Processing Slide:^_^ ({len(queries)} queries)\"\
          )\n\n        # 1. 并发 Execute Retrieval Jobs\n        # 生成 (Query数量 x Plan\
          \ Job数量) 个异步请求\n        fetch_tasks = []\n        for q in queries:\n  \
          \          for job in execution_plan:\n                # 必须 copy job，因为\
          \ retrieve 内部会 pop 字段\n                fetch_tasks.append(self.api.retrieve(q,\
          \ job.copy()))\n        # print(fetch_tasks)\n\n        # 等待所有 API 返回\n\
          \        # raw_results_list 的结构是: [ [ChunkA1, ChunkA2], [ChunkB1], [] ...\
          \ ]\n        raw_results_list = await asyncio.gather(*fetch_tasks)\n   \
          \     # print(raw_results_list)\n\n        # 2. RRF 融合 (修复点：直接传入 List[List])\n\
          \        # 过滤掉空结果，传入 RRF\n        valid_results = [res for res in raw_results_list\
          \ if res]\n        fused_chunks = RagService.reciprocal_rank_fusion(valid_results)\n\
          \n        # 3. 全局 Rerank 打分 (修复点：异步调用，全量不截断)\n        rerank_context = \"\
          \ \".join(queries)  # 简单拼接做 context\n        scored_chunks = await RagService.compute_rerank_scores(rerank_context,\
          \ fused_chunks)\n\n        # 4. 库存分发 (Slicing)\n        final_chunks = self.distribute_chunks_to_tasks(scored_chunks,\
          \ tasks)\n        # print(final_chunks)\n        # 存储cache文档信息\n       \
          \ for res_list in raw_results_list:\n            if res_list:\n        \
          \        self._inject_metadata_from_search_results(final_chunks)\n     \
          \   print(self.doc_meta_cache)\n\n        # 5. 挂载数据到副本中\n        result_object[\"\
          retrieve_data\"] = self.format_output(final_chunks)\n        # 6. 格式化输出\n\
          \        return result_object\n\n\n# --- 模块四：多模态内容格式化器 ---\nclass ContentFormatter:\n\
          \    \"\"\"\n    负责将不同源类型的 chunk 内容格式化为标准输出结构。\n    这是一个可扩展的模块，未来可添加 Image,\
          \ Audio 等格式化器。\n    \"\"\"\n\n    @staticmethod\n    def clean_metadata(raw_data:\
          \ Any) -> Dict[str, Any]:\n        \"\"\"\n        【核心清洗器】\n        输入：可能是\
          \ Dify 详情接口返回的 List[Dict]，也可能是检索接口返回的 Dict。\n        输出：统一的扁平 Dict {key:\
          \ value}。\n        \"\"\"\n        if not raw_data:\n            return\
          \ {}\n        # 场景 A: Retrieve 接口返回的已经是漂亮的 Dict\n        # 例如: {\"source\"\
          : \"file_upload\", \"description\": \"xxx\", \"source_type\": \"document\"\
          }\n        if isinstance(raw_data, dict):\n            return raw_data\n\
          \        # 场景 B: Detail 接口返回的 Ugly List\n        # 例如: [{\"name\": \"vehicle_model\"\
          , \"value\": \"理想L8\"}, {\"name\": \"doc_type\", \"value\": \"维修手册\"}]\n\
          \        result = {}\n        if isinstance(raw_data, list):\n         \
          \   for item in raw_data:\n                # 容错：必须是字典且包含 name 和 value\n\
          \                if isinstance(item, dict) and 'name' in item:\n       \
          \             # 优先取 value，如果没有 value 可能是空字段\n                    val = item.get('value')\n\
          \                    # 有些特殊字段 value 是 \"NULL\" 字符串，转为 None 或空\n        \
          \            if val == \"NULL\":\n                        val = None\n \
          \                   result[item['name']] = val\n            return result\n\
          \        return {}\n\n    @staticmethod\n    def _transform_metadata(meta_list_or_dict:\
          \ Any) -> Dict[str, Any]:\n        \"\"\"\n        【关键修复】\n        将 Dify\
          \ 返回的元数据列表 `[{'name': k, 'value': v}, ...]`\n        转换为标准的字典 `{'k': 'v',\
          \ ...}`。\n        同时兼容已经是字典的情况。\n        \"\"\"\n        if isinstance(meta_list_or_dict,\
          \ dict):\n            return meta_list_or_dict  # 如果已经是字典，直接返回\n       \
          \ if not isinstance(meta_list_or_dict, list):\n            return {}  #\
          \ 如果是其他未知类型，返回空字典\n        # 核心转换逻辑\n        transformed_meta = {}\n   \
          \     for item in meta_list_or_dict:\n            if isinstance(item, dict)\
          \ and 'name' in item and 'value' in item:\n                transformed_meta[item['name']]\
          \ = item['value']\n        return transformed_meta\n\n    @staticmethod\n\
          \    def _parse_key_value_string(content: str) -> Dict[str, Any]:\n    \
          \    \"\"\"\n        解析 \"key1\":\"value1\";\"key2\":\"value2\" 格式的字符串。\n\
          \        \"\"\"\n        data = {}\n        if not isinstance(content, str):\n\
          \            return data\n\n        pairs = content.strip().split(';')\n\
          \        for pair in pairs:\n            if ':' in pair:\n             \
          \   key, val = pair.split(':', 1)\n                # 去除键和值的引号\n        \
          \        key = key.strip().strip('\"')\n                val = val.strip().strip('\"\
          ')\n                data[key] = val\n        return data\n\n    @classmethod\n\
          \    def _format_video_document(cls, chunks: List[Dict], meta: Dict) ->\
          \ Dict:\n        \"\"\"\n        将视频类型的 Chunks 列表格式化为视频文档结构。\n        \"\
          \"\"\n        if not chunks:\n            return {}\n\n        chunks.sort(key=lambda\
          \ x: x.get('position', 0))\n        content_blocks = []\n        video_info\
          \ = {}\n\n        # 1. 解析所有 video chunks，构建 frame 列表\n        for chunk\
          \ in chunks:\n            raw_data = cls._parse_key_value_string(chunk.get(\"\
          content\", \"\"))\n\n            # 提取全局视频信息 (只需一次)\n            if not video_info:\n\
          \                video_info = {\n                    \"duration\": float(raw_data.get(\"\
          视频时长\", 0.0)),\n                    \"videoUrl\": raw_data.get(\"视频链接\"\
          , \"\"),\n                    \"videoName\": raw_data.get(\"视频名称\", \"\"\
          ),\n                }\n\n            # 2. 构建单个 frame 对象\n            try:\n\
          \                frame = {\n                    \"frameId\": raw_data.get(\"\
          视频片段ID\"),\n                    \"frameName\": raw_data.get(\"视频片段名称\"),\n\
          \                    \"frameUrl\": raw_data.get(\"视频片段分段URL\"),\n      \
          \              \"frameImageUrl\": raw_data.get(\"视频片段帧图片URL\"),\n      \
          \              \"startTime\": float(raw_data.get(\"开始时间\", 0.0)),\n    \
          \                \"endTime\": float(raw_data.get(\"结束时间\", 0.0)),\n    \
          \                \"frameDuration\": float(raw_data.get(\"视频片段时长\", 0.0)),\n\
          \                    \"description\": raw_data.get(\"视频片段描述\", \"\"),\n\
          \                    # 保留检索信息\n                    \"position\": chunk.get(\"\
          position\"),\n                    \"score\": chunk.get(\"score\")\n    \
          \            }\n                content_blocks.append(frame)\n         \
          \   except (ValueError, TypeError) as e:\n                print(f\"⚠️ [Video\
          \ Frame Parse Error] Skipping frame. Chunk ID: {chunk.get('id')}, Error:\
          \ {e}\")\n                continue\n\n        # 3. 组装最终的视频文档对象\n       \
          \ doc_meta_dict = meta.get(\"doc_metadata\") or meta.get(\"metadata\") or\
          \ {}\n        raw_doc_name = chunks[0].get(\"document_name\") or video_info.get(\"\
          videoName\") or \"Unknown\"\n        final_doc_name = raw_doc_name\n   \
          \     # 获取目标后缀 (e.g., \"mp4\")\n        target_ext = doc_meta_dict.get(\"\
          extension\")\n        if target_ext and isinstance(raw_doc_name, str):\n\
          \            # 移除旧后缀并添加新后缀\n            if \".\" in raw_doc_name:\n    \
