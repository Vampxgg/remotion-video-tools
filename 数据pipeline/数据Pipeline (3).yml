    - data:
        code: "# Dify 依赖管理: 请确保已添加 httpx, json-repair, tavily-python\nimport sys\n\
          import io\n\n# 设置标准输出编码为 utf-8，防止在 Windows 控制台下出现 UnicodeEncodeError\nsys.stdout\
          \ = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')\n\nimport asyncio\n\
          import random\nfrom itertools import cycle\n\nimport httpx\nimport re\n\
          import os\nimport json\nimport traceback\nfrom typing import Any, Dict,\
          \ List, Coroutine, Literal, Optional, Union\nfrom abc import ABC, abstractmethod\n\
          \n# 引入新依赖的客户端\nfrom tavily import AsyncTavilyClient\nimport json_repair\n\
          from datetime import datetime, timedelta\n\n\n# ==============================================================================\n\
          # ====================== 时间解析辅助模块 =========================\n# ==============================================================================\n\
          def _normalize_date(date_input: str) -> Optional[str]:\n    \"\"\"\n   \
          \ 尝试将各种格式的日期字符串转换为 YYYY-MM-DD 格式。\n    支持: YYYY-MM-DD, YYYY/MM/DD, YYYY.MM.DD,\
          \ YYYY年MM月DD日\n    \"\"\"\n    if not date_input:\n        return None\n\
          \n    date_input = date_input.strip()\n\n    # 常见格式正则\n    patterns = [\n\
          \        (r'(\\d{4})-(\\d{1,2})-(\\d{1,2})', '%Y-%m-%d'),\n        (r'(\\\
          d{4})/(\\d{1,2})/(\\d{1,2})', '%Y/%m/%d'),\n        (r'(\\d{4})\\.(\\d{1,2})\\\
          .(\\d{1,2})', '%Y.%m.%d'),\n        (r'(\\d{4})年(\\d{1,2})月(\\d{1,2})日',\
          \ '%Y年%m月%d日'),\n        (r'(\\d{4})(\\d{2})(\\d{2})', '%Y%m%d'),\n    ]\n\
          \n    for pat, fmt in patterns:\n        match = re.search(pat, date_input)\n\
          \        if match:\n            try:\n                # 提取匹配的部分进行解析\n  \
          \              date_str = match.group(0)\n                dt = datetime.strptime(date_str,\
          \ fmt)\n                return dt.strftime('%Y-%m-%d')\n            except\
          \ ValueError:\n                continue\n    return None\n\n\ndef _parse_relative_time(text:\
          \ str) -> Optional[str]:\n    \"\"\"解析相对时间，返回 YYYY-MM-DD\"\"\"\n    if not\
          \ text: return None\n    today = datetime.now()\n    text = text.lower()\n\
          \n    # 几天前 / 近几天\n    match = re.search(r'(?:近|最近|)(\\d+)\\s*(?:天|日)(?:前|内)?',\
          \ text)\n    if not match: match = re.search(r'(\\d+)\\s*days?\\s*ago',\
          \ text)\n    if match:\n        days = int(match.group(1))\n        return\
          \ (today - timedelta(days=days)).strftime('%Y-%m-%d')\n\n    # 几周前\n   \
          \ match = re.search(r'(?:近|最近|)(\\d+)\\s*周(?:前|内)?', text)\n    if not match:\
          \ match = re.search(r'(\\d+)\\s*weeks?\\s*ago', text)\n    if match:\n \
          \       weeks = int(match.group(1))\n        return (today - timedelta(weeks=weeks)).strftime('%Y-%m-%d')\n\
          \n    # 几月前 (简单按30天算)\n    match = re.search(r'(?:近|最近|)(\\d+)\\s*月(?:前|内)?',\
          \ text)\n    if not match: match = re.search(r'(\\d+)\\s*months?\\s*ago',\
          \ text)\n    if match:\n        months = int(match.group(1))\n        return\
          \ (today - timedelta(days=months * 30)).strftime('%Y-%m-%d')\n\n    # 几年前\n\
          \    match = re.search(r'(?:近|最近|)(\\d+)\\s*年(?:前|内)?', text)\n    if not\
          \ match: match = re.search(r'(\\d+)\\s*years?\\s*ago', text)\n    if match:\n\
          \        years = int(match.group(1))\n        return (today - timedelta(days=years\
          \ * 365)).strftime('%Y-%m-%d')\n\n    return None\n\n\ndef _parse_time_filter(time_input:\
          \ Any) -> Dict[str, str]:\n    \"\"\"\n    解析时间输入，返回 {'after': 'YYYY-MM-DD',\
          \ 'before': 'YYYY-MM-DD'} 字典。\n    \"\"\"\n    result = {}\n    if not time_input:\n\
          \        return result\n\n    # 1. 如果是字典\n    if isinstance(time_input,\
          \ dict):\n        start = time_input.get('start') or time_input.get('after')\
          \ or time_input.get('begin') or time_input.get(\n            'start_date')\n\
          \        end = time_input.get('end') or time_input.get('before') or time_input.get('end_date')\n\
          \n        # 尝试解析绝对时间\n        norm_start = _normalize_date(str(start)) if\
          \ start else None\n        if not norm_start and start: norm_start = _parse_relative_time(str(start))\n\
          \n        norm_end = _normalize_date(str(end)) if end else None\n      \
          \  if not norm_end and end: norm_end = _parse_relative_time(str(end))\n\n\
          \        if norm_start: result['after'] = norm_start\n        if norm_end:\
          \ result['before'] = norm_end\n        return result\n\n    # 2. 如果是字符串\n\
          \    if isinstance(time_input, str):\n        # 2.1 尝试解析相对时间 (e.g., \"近3天\"\
          , \"last week\") -> 默认为 after\n        rel_time = _parse_relative_time(time_input)\n\
          \        if rel_time:\n            # 如果是相对时间，通常意味着 \"从那时到现在\"，即 after\n\
          \            result['after'] = rel_time\n            return result\n\n \
          \       # 2.2 尝试提取绝对日期\n        matches = re.findall(r'(\\d{4}[-/年\\.]\\\
          d{1,2}[-/月\\.]\\d{1,2}日?)', time_input)\n        normalized_dates = []\n\
          \        for m in matches:\n            norm = _normalize_date(m)\n    \
          \        if norm: normalized_dates.append(norm)\n\n        if len(normalized_dates)\
          \ >= 2:\n            # 假设第一个是 start，第二个是 end\n            result['after']\
          \ = normalized_dates[0]\n            result['before'] = normalized_dates[1]\n\
          \        elif len(normalized_dates) == 1:\n            # 只有一个日期，需要判断是 after\
          \ 还是 before\n            lower_input = time_input.lower()\n            if\
          \ any(kw in lower_input for kw in ['before', 'until', 'end', '之前', '截止']):\n\
          \                result['before'] = normalized_dates[0]\n            else:\n\
          \                result['after'] = normalized_dates[0]\n\n    return result\n\
          \n\n# ==============================================================================\n\
          # ====================== DIFY 本地调试辅助模块 =========================\n# ==============================================================================\n\
          import pprint\n\n# --- 本地调试开关 ---\n# 在你的 IDE 中进行测试时，将此值设为 True。\n# 当你准备将代码复制到\
          \ Dify 平台时，请将其改回 False，或直接删除此调试模块。\nIS_LOCAL_DEBUG = True\n\n\ndef _dify_debug_return(data:\
          \ Dict[str, Any], label: str = \"Final Return\") -> Dict[str, Any]:\n  \
          \  \"\"\"\n    一个用于在 Dify 代码节点中进行本地调试的包装函数。\n\n    当 IS_LOCAL_DEBUG 为 True\
          \ 时，它会漂亮地打印出最终要返回的数据，\n    然后原封不动地返回该数据，以便 Dify 平台能正确接收。\n\n    Args:\n\
          \        data (Dict[str, Any]): 准备从 Dify 节点返回的数据。\n        label (str, optional):\
          \ 一个标签，用于在控制台输出中标识来源。默认为 \"Final Return\"。\n\n    Returns:\n        Dict[str,\
          \ Any]: 传入的原始数据。\n    \"\"\"\n    if IS_LOCAL_DEBUG:\n        # 打印一个清晰的分隔符和标签，方便在终端中识别\n\
          \        print(\"\\n\" + \"=\" * 40 + f\" DIFY DEBUG OUTPUT [{label}] \"\
          \ + \"=\" * 40)\n\n        # 使用 pprint 模块进行美化输出，对复杂的嵌套字典特别友好\n        pprint.pprint(data,\
          \ indent=2, width=120)\n\n        # 打印结束分隔符\n        print(\"=\" * 105 +\
          \ \"\\n\")\n\n    # 无论是否打印，都必须原封不动地返回原始数据\n    return data\n\n\ndef _intelligent_input_parser(raw_input:\
          \ Any) -> Dict[str, Any]:\n    \"\"\"\n    健壮地解析复杂的输入结构，提取web搜索查询、职业查询数据和企业查询名称。\n\
          \    \"\"\"\n    if isinstance(raw_input, list) and len(raw_input) > 0:\n\
          \        actual_input = raw_input[0]\n    else:\n        actual_input =\
          \ raw_input\n\n    if isinstance(actual_input, str):\n        if not actual_input.strip():\n\
          \            # 【调整】如果输入为空字符串，返回所有字段都为空的结构，避免下游报错。\n            return {\"\
          comprehensive_queries\": [], \"career_query_data\": {}, \"tianyan_enterprise_names\"\
          : []}\n        try:\n            data = json_repair.loads(actual_input)\n\
          \        except Exception as e:\n            raise ValueError(f\"Failed\
          \ to parse input string as JSON: {e}\\nOriginal input: {str(actual_input)[:500]}...\"\
          )\n    elif isinstance(actual_input, dict):\n        data = actual_input\n\
          \    else:\n        raise TypeError(f\"Expected input type is str, list,\
          \ or dict, but received {type(actual_input).__name__}\")\n    if not isinstance(data,\
          \ dict):\n        raise ValueError(\"Parsed data is not a valid object (dictionary).\"\
          )\n\n    # 安全地提取 web_queries 对象\n    web_queries_obj = data.get(\"web_queries\"\
          , {})\n    if not isinstance(web_queries_obj, dict): web_queries_obj = {}\n\
          \    # 1. 提取 comprehensive_query\n    comprehensive_queries = []\n    query_list\
          \ = web_queries_obj.get(\"comprehensive_query\", [])\n    if isinstance(query_list,\
          \ list) and all(isinstance(item, str) for item in query_list):\n       \
          \ comprehensive_queries = query_list\n\n    # 2. 提取 career_query\n    career_query_data\
