          \ chunk_id not in chunk_details_lookup:\n                chunk_details_lookup[chunk_id]\
          \ = chunk_dict\n\n    # 根据RRF分数对 chunk_id 进行降序排序\n    sorted_chunk_ids =\
          \ sorted(rrf_scores.items(), key=lambda item: item[1], reverse=True)\n\n\
          \    # 利用排好序的 chunk_id 列表，从查找表中取出完整的数据，构建最终结果\n    final_ranked_list = [chunk_details_lookup[chunk_id]\
          \ for chunk_id, score in sorted_chunk_ids]\n\n    return final_ranked_list\n\
          \ndef main(hybrid_chunks: list, precision_chunks: list, rerank: list) ->\
          \ dict:\n    \"\"\"\n    主函数，作为最终融合器，接收多个检索/重排结果并进行最终的RRF融合。\n    \"\"\"\
          \n    # 1. 将所有有效的输入列表收集起来\n    #    这个步骤可以确保即使某个上游节点没有返回结果（例如返回了空列表），代码也不会出错。\n\
          \    list_of_all_rankings = [\n        ranking for ranking in [hybrid_chunks,\
          \ precision_chunks, rerank] \n        if ranking and isinstance(ranking,\
          \ list)\n    ]\n    \n    if not list_of_all_rankings:\n        return {\"\
          result\": []}\n\n    # 2. 调用更新后的 RRF 函数，使用 * 来解包列表，将每个排名作为独立的参数传入\n    res\
          \ = reciprocal_rank_fusion(*list_of_all_rankings)\n    \n    # 3. 截取最终的前\
          \ 10 个结果\n    res = res[:10]\n    \n    return {\n        \"result\": res,\n\
          \    }\n"
