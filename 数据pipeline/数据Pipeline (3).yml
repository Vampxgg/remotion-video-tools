    - data:
        code: "import json\nimport re\nfrom typing import Any, Dict, List, Union\n\
          \n# 依赖管理: 确保已添加 json-repair\nimport json_repair\n\n# --- 辅助函数：智能JSON提取 (此部分已验证，无需修改)\
          \ ---\ndef _extract_most_significant_json(text: str) -> Union[Dict, List]:\n\
          \    \"\"\"\n    智能地从可能包含噪音的文本中提取最主要的JSON对象或列表。\n    \"\"\"\n    try:\n\
          \        return json_repair.loads(text)\n    except Exception:\n       \
          \ pass\n\n    potential_json_strings = re.findall(r'(\\{[\\s\\S]*\\}|\\\
          [[\\s\\S]*\\])', text)\n    if not potential_json_strings:\n        raise\
          \ ValueError(\"输入文本中未能找到任何潜在的JSON结构\")\n\n    valid_jsons = []\n    for\
          \ candidate in potential_json_strings:\n        try:\n            parsed_json\
          \ = json_repair.loads(candidate)\n            valid_jsons.append(parsed_json)\n\
          \        except Exception:\n            continue\n            \n    if not\
          \ valid_jsons:\n        raise ValueError(\"找到了潜在的JSON结构，但没有一个可以被成功修复和解析\"\
          )\n\n    most_significant_json = max(valid_jsons, key=lambda x: len(json.dumps(x,\
          \ ensure_ascii=False)))\n    return most_significant_json\n\n\n# --- 主函数：绝对健壮且格式正确的解析与验证\
          \ ---\ndef main(llm_output_str: str) -> Dict[str, Any]:\n    \"\"\"\n  \
          \  Dify 代码执行节点主函数 - 终极生产级版本。\n\n    此函数严格遵守 Dify 下游节点的数据契约：\n    1.  保证输出结构永远为\
          \ {\"document_names\": [...], \"metadata_conditions\": [...]}.\n    2. \
          \ 将 'document_names' 从字符串列表重塑为 Dify 期望的对象列表 [{'name': '...'}].\n    3. \
          \ 在任何失败情况下，返回默认的空列表结构，确保工作流永不中断。\n    \"\"\"\n    try:\n        # 步骤 1:\
          \ 基本输入验证\n        if not isinstance(llm_output_str, str) or not llm_output_str.strip():\n\
          \            # 对于空输入，直接返回默认的空结构\n            return {\"document_names\"\
          : [], \"metadata_conditions\": []}\n\n        # 步骤 2: 提取并解析JSON\n      \
          \  parsed_json = _extract_most_significant_json(llm_output_str)\n      \
          \  \n        if not isinstance(parsed_json, dict):\n            raise TypeError(\"\
          解析后的根结构不是一个字典\")\n\n        # 步骤 3: 严格验证、提取并【重塑】'document_names'\n     \
          \   document_names_raw = parsed_json.get('document_names')\n        if not\
          \ isinstance(document_names_raw, list):\n            raise TypeError(\"\
          'document_names' 必须是一个列表\")\n        \n        # 【核心修正】: 将字符串列表转换为对象列表\n\
