    - data:
        code: "import json\nimport re\n\ndef process_content_urls(content: str) ->\
          \ str:\n    \"\"\"\n    智能地为字符串中的外部URL添加代理。\n\n    - 查找所有 http:// 和 https://\
          \ 链接。\n    - 如果链接已经是 \"server.x-pilot.cn\" 域名，则跳过。\n    - 将所有其他外部链接通过 \"\
          https://server.x-pilot.cn/proxy?url=\" 进行代理。\n\n    Args:\n        content:\
          \ 包含URL的原始字符串。\n    Returns:\n        处理过URL后的新字符串。\n    \"\"\"\n    # 代理服务的域名，避免重复代理\n\
          \    PROXY_DOMAIN = \"server.x-pilot.cn\"\n    # 代理服务器的完整URL前缀\n    PROXY_PREFIX\
          \ = \"https://server.x-pilot.cn/proxy?url=\"\n\n    # 正则表达式：匹配所有绝对URL\n\
          \    # (https?://...) -> 捕获组1, 捕获整个URL\n    # [^\\s\"'()]+     -> 匹配一个或多个不为空白字符、引号或括号的字符，\n\
          \    #                  这能稳健地捕获URL，避免包含旁边的文本。\n    url_pattern = r\"(https?://[^\\\
          s\\\"'()]+)\"\n\n    def proxy_replacer(match: re.Match) -> str:\n     \
          \   \"\"\"\n        re.sub 的替换函数，决定如何替换每个匹配到的URL。\n        \"\"\"\n    \
          \    original_url = match.group(0)\n\n        # 核心逻辑：如果URL已包含我们自己的域名，则原样返回\n\
          \        if PROXY_DOMAIN in original_url:\n            return original_url\n\
          \n        # 代理规则：为其他所有外部URL添加代理前缀\n        return f\"{PROXY_PREFIX}{original_url}\"\
          \n\n    # 如果 content 为空或不是字符串，直接返回，增加代码健壮性\n    if not isinstance(content,\
          \ str):\n        return content\n        \n    processed_content = re.sub(url_pattern,\
          \ proxy_replacer, content)\n    return processed_content\n\n\ndef main(data)\
          \ -> dict:\n    \"\"\"\n    Dify 代码执行节点主函数。\n    支持输入类型：\n    1. JSON 字符串\
          \ (str): 尝试解析为对象或数组处理，解析失败则作为纯文本处理URL。\n    2. 字典 (dict): 视为单个数据对象，查找 retrieve_data\
          \ 进行处理。\n    3. 列表 (list): 视为数据对象列表，遍历处理。\n    \n    Returns:\n        dict:\
          \ 包含处理后数据的字典 {\"result\": ..., \"output_str\": ...}\n    \"\"\"\n    # 1.\
          \ 处理字符串输入\n    if isinstance(data, str):\n        try:\n            # 尝试解析\
          \ JSON\n            parsed_data = json.loads(data)\n            # 递归调用 main\
          \ 处理解析后的数据\n            result = main(parsed_data)\n            # 更新 output_str\
          \ 为处理后的 JSON 字符串\n            result[\"output_str\"] = json.dumps(result[\"\
          output\"], ensure_ascii=False)\n            return result\n        except\
          \ json.JSONDecodeError:\n            # 解析失败，视为纯文本，直接处理其中的 URL\n        \
          \    processed_text = process_content_urls(data)\n            return {\"\
          output\": processed_text, \"output_str\": processed_text, \"NULL\": \"\"\
          }\n\n    # 2. 统一处理逻辑\n    # 此时 data 应该是 list 或 dict (如果是其他类型，如 None/int，直接返回)\n\
          \    if not data:\n        return {\"output\": data, \"output_str\": json.dumps(data,\
          \ ensure_ascii=False) if data is not None else \"\", \"NULL\": \"\"}\n\n\
          \    # 为了统一处理，将 dict 包装成 list 的视图（或者直接针对性处理）\n    # 注意：为了保持原地修改（如果是引用类型），我们需要小心处理\n\
          \    items_to_process = []\n    \n    if isinstance(data, dict):\n     \
          \   items_to_process = [data]\n    elif isinstance(data, list):\n      \
          \  items_to_process = data\n    else:\n        # 其他类型不处理\n        return\
          \ {\"output\": data, \"output_str\": str(data), \"NULL\": \"\"}\n\n    try:\n\
          \        for item in items_to_process:\n            if not isinstance(item,\
          \ dict):\n                continue\n                \n            # 检查是否有\
          \ retrieve_data 字段\n            if \"retrieve_data\" in item and isinstance(item[\"\
          retrieve_data\"], list):\n                retrieve_chunks = item[\"retrieve_data\"\
          ]\n                for chunk in retrieve_chunks:\n                    if\
          \ isinstance(chunk, dict):\n                        original_content = chunk.get(\"\
          content\", \"\")\n                        if isinstance(original_content,\
          \ str):\n                            chunk[\"content\"] = process_content_urls(original_content)\n\
          \            \n            # 增强：如果 item 本身就有 content 字段（非嵌套结构），也可以顺手处理\n\
          \            # 这增加了工具的通用性\n            if \"content\" in item and isinstance(item[\"\
          content\"], str):\n                item[\"content\"] = process_content_urls(item[\"\
          content\"])\n\n        return {\"output\": data, \"output_str\": json.dumps(data,\
          \ ensure_ascii=False), \"NULL\": \"\"}\n\n    except Exception as e:\n \
          \       print(f\"An error occurred: {e}\")\n        return {\"output\":\
          \ data, \"output_str\": json.dumps(data, ensure_ascii=False), \"NULL\":\
          \ \"\"}"
