    - data:
        code: "# Dify 知识库代码节点：多输入智能 JSON 解析器\n# Author: Senior Software Engineer\n\
          # Version: 2.0\n\nimport json\nimport re\nfrom typing import Any, Dict,\
          \ List, Union\n\n# 确保已在 Dify 的“依赖管理”中添加了 json-repair 依赖\n# pip install json-repair\n\
          import json_repair\n\n# ==============================================================================\n\
          #  核心解析逻辑 (来自于你的版本，因为它非常健壮)\n#  无需修改，我们直接复用这个强大的底层函数。\n# ==============================================================================\n\
          def _extract_most_significant_json(text: str) -> Union[Dict, List]:\n  \
          \  \"\"\"\n    智能地从可能包含噪音、注释或多个JSON片段的文本中提取最主要的JSON对象或列表。\n    \n    智能性体现在：\n\
          \    1.  **分层解析**: 优先使用高速标准库，失败后才动用重量级修复工具。\n    2.  **候选者识别**: 即使文本中散落着多个JSON片段，也能识别出它们。\n\
          \    3.  **信息量最大原则**: 通过比较大小和复杂性，选择最可能符合用户意图的那个JSON对象。\n    4.  **鲁棒性**:\
          \ 结合预处理和强大的修复库，最大化解析成功率。\n    \"\"\"\n    \n    # --- 阶段1: 快速通道 - 尝试直接解析\
          \ ---\n    try:\n        return json_repair.loads(text)\n    except Exception:\n\
          \        pass\n\n    # --- 阶段2: 高级提取 - 寻找并评估候选JSON ---\n    potential_json_strings\
          \ = re.findall(r'(\\{[\\s\\S]*\\}|\\[[\\s\\S]*\\])', text)\n    \n    if\
          \ not potential_json_strings:\n        raise ValueError(\"在输入文本中未能找到任何潜在的JSON结构\
          \ (即 {...} 或 [...] 块)\")\n\n    valid_jsons = []\n    for candidate in potential_json_strings:\n\
          \        try:\n            parsed_json = json_repair.loads(candidate)\n\
          \            valid_jsons.append(parsed_json)\n        except Exception:\n\
          \            continue\n            \n    if not valid_jsons:\n        raise\
          \ ValueError(\"找到了潜在的JSON结构，但没有一个可以被成功修复和解析\")\n\n    # --- 智能决策：选择信息量最大的JSON\
          \ ---\n    most_significant_json = max(valid_jsons, key=lambda x: len(json.dumps(x,\
          \ ensure_ascii=False)))\n    \n    return most_significant_json\n\n\n# ==============================================================================\n\
          #  主执行函数 (全新设计，支持多输入)\n# ==============================================================================\n\
          def main(**kwargs: Any) -> Dict[str, Any]:\n    \"\"\"\n    Dify 代码执行节点主函数\
          \ - 【多输入通用版】\n    \n    核心功能:\n    1. 接受任意数量的命名输入参数 (例如 arg1, arg2, user_profile,\
          \ 等)。\n    2. 对每一个输入进行智能类型检查和解析。\n    3. 如果输入是字符串，则调用 _extract_most_significant_json\
          \ 函数进行解析。\n    4. 如果输入已经是 dict 或 list，则直接使用。\n    5. 将所有成功解析的对象收集到一个字典中返回。\n\
          \    6. 输出的键名会自动在原始输入键名后附加 \"_obj\" 后缀，方便下游引用。\n    \n    使用示例:\n    - 输入1:\
          \ key=\"arg1\", value=\"{'name': 'Alice'}\"\n    - 输入2: key=\"arg2\", value=\"\
          [1, 2, 3]\"\n    - 输出: {'arg1_obj': {'name': 'Alice'}, 'arg2_obj': [1, 2,\
          \ 3]}\n    \"\"\"\n    # 最终输出的结果字典\n    parsed_outputs = {}\n\n    # kwargs\
          \ 是一个字典，包含了所有在 Dify 界面上定义的输入变量\n    # 例如：{'arg1': \"{'name': 'value'}\"\
          , 'arg2': \"some other string\"}\n    if not kwargs:\n        # 如果没有配置任何输入参数，可以返回一个空字典或提示信息\n\
          \        return {\"status\": \"No inputs provided.\"}\n\n    # 遍历所有传入的参数\n\
          \    for key, raw_input in kwargs.items():\n        output_key = f\"{key}_obj\"\
          \  # 构造新的输出键名，例如 arg1 -> arg1_obj\n        \n        try:\n            if\
          \ isinstance(raw_input, (dict, list)):\n                # 如果输入已经是正确的 Python\
          \ 对象，直接赋值\n                parsed_outputs[output_key] = raw_input\n    \
          \        \n            elif isinstance(raw_input, str):\n              \
          \  if not raw_input.strip():\n                    # 对空字符串进行处理，可以设置为 None\
          \ 或抛出错误\n                    # 这里我们选择设置为 None，下游可以判断\n                 \
          \   parsed_outputs[output_key] = None\n                    continue # 继续处理下一个输入\n\
          \                \n                # 调用强大的解析函数\n                parsed_object\
          \ = _extract_most_significant_json(raw_input)\n                parsed_outputs[output_key]\
          \ = parsed_object\n                \n            else:\n               \
          \ # 对于其他意外的类型，记录一个错误或直接赋值\n                # 为了健壮性，我们将其原始值放入，并可以在日志中警告\n\
          \                # 或者直接抛出错误：raise TypeError(...)\n                parsed_outputs[output_key]\
          \ = {\n                    \"error\": f\"Unsupported input type for '{key}'\"\
          ,\n                    \"type\": str(type(raw_input)),\n               \
          \     \"value\": str(raw_input)\n                }\n\n        except Exception\
          \ as e:\n            # 如果在解析过程中发生任何错误，构造一个清晰的错误信息\n            # 这样在 Dify\
          \ 的日志中可以快速定位问题\n            error_message = (\n                f\"Error\
          \ processing input '{key}': {e}\\n\"\n                f\"Original input\
          \ (first 500 chars): {str(raw_input)[:500]}...\"\n            )\n      \
          \      # 将错误信息作为输出，而不是让整个工作流失败\n            parsed_outputs[output_key] =\
          \ {\"error\": error_message}\n    \n    return parsed_outputs"
