          \        except:\n            items_to_process = [raw_input]  # 可能是普通字符串或无法解析的字符串，作为单项处理\n\
          \    else:\n        items_to_process = [raw_input]\n\n    if not items_to_process:\n\
          \        return {\"datas\": [], \"datas_str\": \"[]\"}\n\n    # 1.1 解析时间过滤\n\
          \    time_filter = _parse_time_filter(time_filter_input)\n    if time_filter:\n\
