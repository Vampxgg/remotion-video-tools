        code: "import requests\nimport json\nfrom typing import List, Dict, Any\n\n\
          # 强烈建议将 API Key 存储在环境变量中，而不是硬编码在代码里\n# In Dify, you can set it in \"Settings\"\
          \ -> \"Environment Variables\"\n# from os import getenv\n# SILICONFLOW_API_KEY\
          \ = getenv(\"SILICONFLOW_API_KEY\", \"YOUR_DEFAULT_KEY_HERE\")\nSILICONFLOW_API_KEY\
          \ = \"sk-zdxzbykdzqbmpjlnasfjpapuzdkupupghxsaopftaqnvyfrv\"\nSILICONFLOW_RERANK_URL\
          \ = \"https://api.siliconflow.cn/v1/rerank\"\n\ndef rerank_detailed_chunks(query:\
          \ str, chunks: List[Dict[str, Any]], top_n: int = 10) -> List[Dict[str,\
          \ Any]]:\n    \"\"\"\n    【已更新】使用 SiliconFlow API 对包含详细信息的 chunk 列表进行重排序。\n\
          \n    这个版本会：\n    1. 从输入的字典列表中提取 'content' 字段，发送给 Rerank API。\n    2. 接收带有新分数和原始索引的响应。\n\
          \    3. 使用返回的索引找到原始的完整 chunk 字典。\n    4. 用 Reranker 返回的、更精确的分数更新 chunk 的\
          \ 'score' 字段。\n    5. 返回一个保留了所有元数据（如 chunk_id, source）的、经过精确重排的字典列表。\n\n\
          \    Args:\n        query (str): 用于重排序的查询语句。\n        chunks (List[Dict[str,\
          \ Any]]): 包含详细信息的 chunk 列表。\n        top_n (int): 希望返回的最相关的 chunk 数量。\n\n\
          \    Returns:\n        List[Dict[str, Any]]: 经过重排序并更新了分数的完整 chunk 列表。\n\
          \    \"\"\"\n    if not chunks:\n        return []\n\n    # 1. 提取所有 chunk\
          \ 的文本内容用于 API 请求\n    documents_content = [chunk.get(\"content\", \"\")\
          \ for chunk in chunks]\n\n    # 2. 构建 API 请求体\n    payload = {\n       \
          \ \"model\": \"BAAI/bge-reranker-v2-m3\",\n        \"query\": query,\n \
          \       \"documents\": documents_content,\n        \"top_n\": top_n,\n \
          \       \"return_documents\": False  # 我们只需要索引和分数，以节省带宽\n    }\n\n    headers\
          \ = {\n        \"Authorization\": f\"Bearer {SILICONFLOW_API_KEY}\",\n \
          \       \"Content-Type\": \"application/json\"\n    }\n\n    # 3. 发送请求并处理响应\n\
          \    try:\n        response = requests.post(SILICONFLOW_RERANK_URL, json=payload,\
          \ headers=headers)\n        response.raise_for_status()\n        data =\
          \ response.json()\n    except requests.exceptions.RequestException as e:\n\
          \        print(f\"Error calling SiliconFlow API: {e}\")\n        # 在API失败时，可以考虑返回原始\
          \ chunks 作为降级策略\n        return chunks[:top_n]\n\n    # 4. 重构结果：将 Rerank\
          \ 分数与原始元数据合并\n    reranked_results = []\n    api_results = data.get(\"results\"\
          , [])\n\n    for item in api_results:\n        # 获取 rerank 后的分数 和 对应的原始索引\n\
          \        original_index = item[\"index\"]\n        new_score = item[\"relevance_score\"\
          ]\n\n        # 找到原始的、包含所有元数据的 chunk 字典\n        original_chunk = chunks[original_index]\n\
          \        \n        # 创建一个副本，并用新的、更精确的分数替换旧分数\n        updated_chunk = original_chunk.copy()\n\
          \        updated_chunk[\"score\"] = round(new_score, 4)\n        \n    \
          \    reranked_results.append(updated_chunk)\n\n    return reranked_results\n\
          \ndef main(query: list, chunks: list) -> dict:\n    \"\"\"\n    主函数，调用更新后的\
          \ Reranker 函数。\n    \"\"\"\n    # Dify 中，单行文本输入通常被包装在列表中，所以我们取第一个元素\n  \
          \  current_query = query[0] if query and isinstance(query, list) else \"\
          \"\n    \n    # 调用新的 Reranker 函数，它会返回一个包含完整信息的列表\n    final_result = rerank_detailed_chunks(current_query,\
          \ chunks, top_n=10)\n    \n    return {\n        \"result\": final_result\n\
          \    }\n\n\n# import requests\n# import json\n# from typing import List,\
          \ Dict\n\n# SILICONFLOW_API_KEY = \"sk-zdxzbykdzqbmpjlnasfjpapuzdkupupghxsaopftaqnvyfrv\"\
          \n# SILICONFLOW_RERANK_URL = \"https://api.siliconflow.cn/v1/rerank\"\n\n\
          # def rerank_chunks_with_scores(query: str, documents: List[str], top_n:\
          \ int = None) -> List[Dict[str, float]]:\n#     if not documents:\n#   \
          \      return []\n\n#     payload = {\n#         \"model\": \"BAAI/bge-reranker-v2-m3\"\
          ,\n#         \"query\": query,\n#         \"documents\": documents,\n# \
          \        \"top_n\": top_n if top_n is not None else len(documents),\n# \
          \        \"return_documents\": False\n#     }\n\n#     headers = {\n#  \
          \       \"Authorization\": f\"Bearer {SILICONFLOW_API_KEY}\",\n#       \
          \  \"Content-Type\": \"application/json\"\n#     }\n\n#     response = requests.post(SILICONFLOW_RERANK_URL,\
          \ json=payload, headers=headers)\n#     response.raise_for_status()\n# \
          \    data = response.json()\n#     results = data.get(\"results\", [])\n\
          #     sorted_results = sorted(results, key=lambda x: x[\"relevance_score\"\
          ], reverse=True)\n#     formatted = [\n#         {\n#             \"content\"\
          : documents[item[\"index\"]],\n#             \"score\": round(item.get(\"\
          relevance_score\", 0), 4)\n#         }\n#         for item in sorted_results\n\
          #     ]\n#     return formatted\n\n# def main(query: list, chunks: list)\
          \ -> dict:\n#     result = rerank_chunks_with_scores(query[0], chunks)\n\
          #     result = [item[\"content\"] for item in result]\n#     return {\n\
          #         \"result\": result[:10],\n#     }\n"
