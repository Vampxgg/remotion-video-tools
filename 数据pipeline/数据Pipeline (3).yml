          \          final_query += f\" after:{time_filter['after']}\"\n        if\
          \ time_filter.get('before'):\n            final_query += f\" before:{time_filter['before']}\"\
          \n\n    print(\"-\" * 20)\n    print(f\"Original: {original_query} -> Final:\
