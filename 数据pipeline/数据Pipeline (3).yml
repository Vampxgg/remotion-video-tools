    - data:
        code: "import json\nimport ast\nfrom typing import Dict, Any, List, Union\n\
          \ndef main(input_string: str) -> Dict[str, Any]:\n    \"\"\"\n    【终极健硕版】Dify\
          \ 任务解析器\n    支持输入格式：\n    1. 标准 JSON 字符串\n    2. Python Literal (列表/字典/元组)\n\
          \    3. 纯字符串 (视为 DB ID)\n    4. 扁平字典 (自动识别单文档)\n    5. 简写元组 \"DB_ID\", \"\
          DOC_1\", \"DOC_2\"\n    \"\"\"\n    \n    tasks: List[Dict[str, Any]] =\
          \ []\n    \n    # --- [Stage 1] 解析层：将字符串转为 Python 对象 ---\n    raw_input\
          \ = input_string.strip()\n    parsed_obj = None\n\n    # 尝试 1: JSON 解析 (处理\
          \ true/null/双引号)\n    try:\n        parsed_obj = json.loads(raw_input)\n\
          \    except json.JSONDecodeError:\n        # 尝试 2: Python AST 解析 (处理 True/None/单引号/元组)\n\
          \        try:\n            parsed_obj = ast.literal_eval(raw_input)\n  \
          \      except (ValueError, SyntaxError):\n            # 尝试 3: 兜底逻辑 - 视为纯字符串\n\
          \            # 如果包含逗号，尝试切分\n            if \",\" in raw_input and \"{\"\
          \ not in raw_input and \"[\" not in raw_input:\n                parsed_obj\
          \ = [s.strip() for s in raw_input.split(\",\") if s.strip()]\n         \
          \   else:\n                parsed_obj = raw_input\n\n    # --- [Stage 2]\
          \ 归一化层：将不同形状的对象转为标准的 List[Dict] ---\n    normalized_items = []\n\n    if\
          \ isinstance(parsed_obj, list):\n        normalized_items = parsed_obj\n\
          \    elif isinstance(parsed_obj, dict):\n        normalized_items = [parsed_obj]\n\
          \    elif isinstance(parsed_obj, tuple):\n        # 智能元组处理：(\"db_id\", \"\
          doc_1\", \"doc_2\") \n        # 约定：第一个是 db_id，后面全是 doc_id\n        if len(parsed_obj)\
          \ > 0:\n            db_id = str(parsed_obj[0])\n            if len(parsed_obj)\
          \ == 1:\n                normalized_items = [{\"database_id\": db_id}]\n\
          \            else:\n                # 构建嵌套结构模拟标准输入\n                doc_list\
          \ = [{\"document_id\": str(d), \"retrieval_mode\": \"segment_retrieval\"\
          } for d in parsed_obj[1:]]\n                normalized_items = [{\"database_id\"\
          : db_id, \"document_info\": doc_list}]\n    elif isinstance(parsed_obj,\
          \ str) and parsed_obj:\n        # 纯字符串 -> 全库检索\n        normalized_items\
          \ = [{\"database_id\": parsed_obj}]\n    else:\n        print(f\"⚠️ 无法识别的输入类型:\
          \ {type(parsed_obj)}，跳过。\")\n\n    # --- [Stage 3] 业务逻辑层：平展、填充默认值 ---\n\
          \    for item in normalized_items:\n        if not isinstance(item, dict)\
          \ and not isinstance(item, str):\n            continue\n            \n \
          \       # 容错：如果列表里混进了字符串 [\"id1\", \"id2\"]，转为全库对象\n        if isinstance(item,\
          \ str):\n            item = {\"database_id\": item}\n\n        # 获取 Database\
          \ ID\n        database_id = item.get(\"database_id\")\n        \n      \
          \  # 容错：扁平写法支持 (用户写了 {\"database_id\": \"xx\", \"document_id\": \"xx\"})\n\
          \        if \"document_id\" in item:\n            flat_task = item.copy()\n\
          \            # 默认模式填充\n            if not flat_task.get(\"retrieval_mode\"\
          ):\n                flat_task[\"retrieval_mode\"] = \"segment_retrieval\"\
          \n            # 默认 top_k 填充\n            if flat_task[\"retrieval_mode\"\
          ] == \"segment_retrieval\" and not flat_task.get(\"top_k\"):\n         \
          \       flat_task[\"top_k\"] = 20\n            tasks.append(flat_task)\n\
          \            continue\n\n        if not database_id:\n            continue\n\
          \n        # 判断是否全库 (没有 document_info 且没有 split 出来的 document_id)\n      \
          \  if \"document_info\" not in item:\n            tasks.append({\n     \
          \           \"database_id\": database_id,\n                \"retrieval_mode\"\
          : \"full_database_retrieval\"\n            })\n            continue\n\n\
          \        # 处理嵌套的 Document Info\n        doc_list = item.get(\"document_info\"\
          , [])\n        if isinstance(doc_list, list):\n            for doc in doc_list:\n\
          \                if isinstance(doc, str):\n                    # 容错：document_info\
          \ 写成了 [\"doc_id1\", \"doc_id2\"]\n                    doc = {\"document_id\"\
          : doc, \"retrieval_mode\": \"segment_retrieval\"}\n                \n  \
          \              if isinstance(doc, dict):\n                    task = doc.copy()\n\
          \                    task[\"database_id\"] = database_id\n             \
          \       \n                    # 智能填充\n                    if task.get(\"\
          retrieval_mode\") == \"segment_retrieval\" or not task.get(\"retrieval_mode\"\
          ):\n                        task[\"retrieval_mode\"] = \"segment_retrieval\"\
          \ # 默认为切片检索\n                        if not task.get(\"top_k\"):\n     \
          \                       task[\"top_k\"] = 20\n                         \
          \   \n                    tasks.append(task)\n\n    return {\n        \"\
          tasks\": tasks\n    }\n"
