          \ (Provider, Search Types, Rules)\n    # 这些配置对所有 items 都是通用的\n\n    # 2.1\
          \ 处理专属规则\n    exclusive_queries = []\n    is_exclusive_requested = \"exclusive_rules\"\
          \ in search_types\n    effective_search_types = [t for t in search_types\
          \ if t != \"exclusive_rules\"]\n    if not effective_search_types: effective_search_types\
          \ = [\"web\"]\n\n    if is_exclusive_requested:\n        exclusive_queries\
          \ = _generate_exclusive_queries(regional_data)\n\n    has_web_work = True\
          \  # 简化逻辑，总是有可能需要web search，具体看query是否为空\n\n    # 2.2 处理 Provider 选择\n \
          \   selected_providers = []\n    web_search_providers_to_use = []\n\n  \
          \  if isinstance(provider_selection, str):\n        selected_providers =\
          \ [p.strip().lower() for p in provider_selection.split(',')]\n    elif isinstance(provider_selection,\
          \ list):\n        selected_providers = [str(p).lower() for p in provider_selection]\n\
          \n    is_zhilian_requested = \"zhilian_job\" in selected_providers\n   \
          \ is_tianyan_requested = \"tianyan_check_enterprises\" in selected_providers\n\
          \n    searcher = MultiSourceSearcher()\n    all_web_provider_names = searcher.get_web_provider_names()\n\
          \n    if \"all\" in selected_providers:\n        web_search_providers_to_use\
          \ = all_web_provider_names\n    else:\n        web_search_providers_to_use\
          \ = [p for p in selected_providers if p in all_web_provider_names]\n\n \
          \   # 3. 并发处理所有 Items\n    print(f\"\U0001F680 [Main] Starting batch processing\
          \ for {len(items_to_process)} items...\")\n\n    # 限制并发数为 10，避免触发 API Rate\
          \ Limit\n    semaphore = asyncio.Semaphore(10)\n\n    async def sem_process_item(item,\
          \ client):\n        async with semaphore:\n            return await _process_single_item(\n\
          \                raw_item_input=item,\n                searcher=searcher,\n\
          \                client=client,\n                web_search_providers_to_use=web_search_providers_to_use,\n\
          \                effective_search_types=effective_search_types,\n      \
          \          is_exclusive_requested=is_exclusive_requested,\n            \
          \    exclusive_queries=exclusive_queries,\n                web_results_per_type=web_results_per_type,\n\
          \                video_results_count=video_results_count,\n            \
          \    is_zhilian_requested=is_zhilian_requested,\n                is_tianyan_requested=is_tianyan_requested,\n\
          \                regional_data=regional_data,\n                time_filter=time_filter\n\
          \            )\n\n    # http2=True 需要安装 h2 库，如果没装会报错。为保险起见，这里先关掉 http2，或者改为\
          \ try-except 自动降级\n    # async with httpx.AsyncClient(http2=True, verify=False)\
          \ as client:\n    async with httpx.AsyncClient(http2=False, verify=False)\
          \ as client:\n        tasks = []\n        for item in items_to_process:\n\
          \            tasks.append(sem_process_item(item, client))\n\n        results\
          \ = await asyncio.gather(*tasks)\n\n    # 4. 返回结果列表\n    final_output =\
          \ {\n        \"datas\": results\n    }\n\n    return {\n        \"datas\"\
          : final_output[\"datas\"],\n        \"datas_str\": json.dumps(final_output,\
          \ ensure_ascii=False, indent=2)\n    }\n\n\n# --- Dify 同步入口 ---\n# 【调整】重构\
          \ main 函数以适应新的异步逻辑和更复杂的 provider 输入\ndef main(\n        raw_input: Any,\n\
          \        provider: Union[str, List[str]] = \"tavily\",\n        search_types:\
          \ Union[str, List[str]] = \"web\",\n        web_results_per_type: Any =\
          \ 3,\n        video_results_count: Any = 2,\n        regional_rules: Any\
          \ = None,\n        time_filter: Any = None\n) -> Dict[str, Any]:\n    #\
          \ 定义一个标准的空/错误返回结构\n    error_datas_structure = {\"comprehensive_data\":\
          \ [], \"career_data\": {}, \"tianyan_check_data\": []}\n\n    def construct_error_payload(e,\
          \ trace):\n        error_message = f\"An error occurred in the node: {str(e)}\"\
          \n        error_datas_structure[\"comprehensive_data\"] = [\n          \
          \  {\"query\": \"NODE_EXECUTION_ERROR\", \"web_results\": [], \"video_results\"\
          : [], \"errors\": [error_message, trace]}\n        ]\n        return {\n\
          \            \"datas\": error_datas_structure,\n            \"datas_str\"\
          : json.dumps({\"datas\": error_datas_structure}, ensure_ascii=False, indent=2)\n\
          \        }\n\n    try:\n        # 1. 健壮地处理 provider 输入\n        provider_selection\
          \ = provider\n        # if isinstance(provider, str) and provider.strip().startswith('[')\
          \ and provider.strip().endswith(']'):\n        #     try:\n        #   \
          \      # 尝试将字符串形式的列表解析为真实的 Python 列表\n        #         provider_selection\
          \ = json.loads(provider)\n        #     except json.JSONDecodeError:\n \
          \       #         raise ValueError(f\"Provider input '{provider}' looks\
          \ like a list but is not valid JSON.\")\n        if isinstance(provider,\
          \ str):\n            cleaned_provider = provider.strip()\n\n           \
          \ # --- 检测是否是列表格式 \"[...]\" ---\n            if cleaned_provider.startswith('[')\
          \ and cleaned_provider.endswith(']'):\n                try:\n          \
          \          # 尝试1: 标准 JSON 解析 (要求双引号)\n                    provider_selection\
          \ = json.loads(cleaned_provider)\n                except json.JSONDecodeError:\n\
          \                    try:\n                        # 尝试2: 使用 json_repair\
          \ (可以自动把单引号修成双引号，完美解决您的问题)\n                        provider_selection =\
          \ json_repair.loads(cleaned_provider)\n                    except Exception:\n\
          \                        # 尝试3: 最后的暴力兜底 (手动去除括号和引号)\n                  \
          \      # 逻辑：去掉首尾括号 -> 按逗号分割 -> 去掉每一项周围的空格和单/双引号\n                      \
          \  inner_content = cleaned_provider[1:-1]\n                        provider_selection\
          \ = [\n                            item.strip().strip(\"'\").strip('\"')\n\
          \                            for item in inner_content.split(',')\n    \
          \                        if item.strip()\n                        ]\n\n\
          \            # --- 检测是否是逗号分隔字符串 \"a, b\" (非列表格式) ---\n            elif ','\
          \ in cleaned_provider:\n                provider_selection = [p.strip()\
          \ for p in cleaned_provider.split(',') if p.strip()]\n\n        # 2. 【新增】健壮地处理\
          \ search_types 输入\n        search_types_list = []\n        if isinstance(search_types,\
          \ str):\n            try:\n                # 尝试解析 JSON 字符串 (e.g., '[\"web\"\
          , \"industry_reports\"]')\n                parsed_list = json.loads(search_types)\n\
          \                if isinstance(parsed_list, list):\n                   \
          \ search_types_list = parsed_list\n                else:\n             \
          \       raise ValueError(\"Input is not a list.\")\n            except (json.JSONDecodeError,\
          \ ValueError):\n                # 如果失败，则按逗号分割 (e.g., \"web,video\")\n  \
          \              search_types_list = [t.strip() for t in search_types.split(',')\
          \ if t.strip()]\n        elif isinstance(search_types, list):\n        \
          \    search_types_list = search_types\n\n        # 3. 健壮地处理 regional_rules\
          \ 输入\n        regional_data_dict = {}\n        if isinstance(regional_rules,\
          \ dict):\n            regional_data_dict = regional_rules\n        elif\
          \ isinstance(regional_rules, str) and regional_rules.strip():\n        \
          \    try:\n                # 尝试解析JSON字符串\n                parsed_data =\
          \ json_repair.loads(regional_rules)\n                if isinstance(parsed_data,\
          \ dict):\n                    regional_data_dict = parsed_data\n       \
          \     except Exception as e:\n                print(f\"  -> [Warning] Failed\
          \ to parse regional_rules as JSON: {e}. It will be ignored.\")\n\n     \
          \   # 4. 健壮地处理数字输入\n        try:\n            web_count = int(web_results_per_type)\
          \ if web_results_per_type not in [None, \"\"] else 3\n        except (ValueError,\
          \ TypeError):\n            web_count = 3\n        try:\n            video_count\
          \ = int(video_results_count) if video_results_count not in [None, \"\"]\
          \ else 2\n        except (ValueError, TypeError):\n            video_count\
          \ = 2\n\n        # 4. 运行核心异步逻辑\n        res = asyncio.run(main_async(\n\
          \            raw_input=raw_input,\n            provider_selection=provider_selection,\n\
          \            search_types=search_types_list,\n            web_results_per_type=web_count,\n\
          \            video_results_count=video_count,\n            regional_data=regional_data_dict,\n\
          \            time_filter_input=time_filter\n        ))\n\n        return\
          \ _dify_debug_return(res, label='Success')\n    except Exception as e:\n\
          \        trace = traceback.format_exc()\n        print(f\"‼️ 节点执行时发生顶层错误:\
          \ {e}\\n{trace}\")\n        error_payload = construct_error_payload(e, trace)\n\
          \        return _dify_debug_return(error_payload, label='Exception')\n\n\
          \n# main({\n#     \"component_id\": \"comp_001\",\n#     \"web_queries\"\
          : {\n#         \"comprehensive_query\": [\"保育员\"],\n#         \"career_query\"\
