    - data:
        code: "import json\nfrom typing import Dict, Any, Optional\n\ndef main(llm_output:\
          \ str) -> Dict[str, Any]:\n    \"\"\"\n    一个健壮的函数，用于解析上一个LLM节点输出的JSON字符串。\n\
          \n    该函数专门设计用于Dify代码执行节点，具备以下特性：\n    1.  **输入验证**: 检查输入是否为非空字符串。\n   \
          \ 2.  **JSON解析**: 尝试将输入字符串解析为JSON对象。\n    3.  **格式验证**: 确保解析后的对象是字典，并且包含预期的键。\n\
          \    4.  **优雅降级**: 在任何步骤失败时，都会打印详细的错误日志，并返回一个表示“未匹配”的默认值，确保工作流不会因意外输入而崩溃。\n\
          \    5.  **结构化输出**: 成功解析后，会生成一个结构清晰的字典，直接供后续的知识库检索节点使用。\n\n    :param llm_output:\
          \ 来自上一个语言模型节点的原始字符串输出。\n                       预期格式: '{\"knowledge_base_id\"\
          : \"...\", \"vehicle_model\": \"...\"}'\n    :return: 一个包含 database_id 和\
          \ metadata_filter 的字典。\n             如果成功: {\"database_id\": \"...\", \"\
          metadata_filter\": {\"vehicle_model\": \"...\"} or None}\n             如果失败:\
          \ {\"database_id\": \"\", \"metadata_filter\": None}\n    \"\"\"\n    \n\
          \    # 定义失败时的默认返回结构\n    default_failure_output = {\n        \"database_id\"\
          : \"\",\n        \"metadata_filter\": None\n    }\n\n    # 1. 输入验证：检查输入是否有效\n\
          \    if not llm_output or not isinstance(llm_output, str):\n        print(f\"\
          [Parser Log] 错误：输入为空或类型不正确。接收到的输入: {llm_output}\")\n        return default_failure_output\n\
          \n    print(f\"[Parser Log] 接收到原始输入: {llm_output}\")\n\n    # 2. JSON解析：使用\
          \ try-except 块来捕获潜在的解析错误\n    try:\n        data = json.loads(llm_output)\n\
          \    except json.JSONDecodeError:\n        print(f\"[Parser Log] 错误：输入不是一个有效的JSON字符串。\"\
          )\n        # 尝试进行简单的修复（有时LLM会添加额外的前后文本）\n        try:\n            # 找到第一个\
          \ '{' 和最后一个 '}'\n            start = llm_output.find('{')\n            end\
          \ = llm_output.rfind('}')\n            if start != -1 and end != -1 and\
          \ start < end:\n                cleaned_str = llm_output[start:end+1]\n\
          \                print(f\"[Parser Log] 尝试清理字符串并重新解析: {cleaned_str}\")\n\
          \                data = json.loads(cleaned_str)\n            else:\n   \
          \             raise json.JSONDecodeError(\"无法在字符串中找到有效的JSON对象。\", \"\",\
          \ 0)\n        except json.JSONDecodeError as e:\n            print(f\"[Parser\
          \ Log] 清理后再次解析失败: {e}\")\n            return default_failure_output\n\n\
          \    # 3. 格式验证：确保解析出的数据是字典\n    if not isinstance(data, dict):\n       \
          \ print(f\"[Parser Log] 错误：解析后的数据不是一个字典（dict）类型。\")\n        return default_failure_output\n\
          \n    # 4. 提取数据：使用 .get() 方法安全地获取值，避免 KeyError\n    knowledge_base_id =\
          \ data.get(\"knowledge_base_id\")\n    vehicle_model = data.get(\"vehicle_model\"\
          )\n\n    # 验证关键字段是否存在\n    if knowledge_base_id is None or vehicle_model\
          \ is None:\n        print(f\"[Parser Log] 错误：解析后的JSON对象缺少 'knowledge_base_id'\
          \ 或 'vehicle_model' 键。\")\n        return default_failure_output\n     \
          \   \n    print(f\"[Parser Log] 解析成功 -> 知识库ID: '{knowledge_base_id}', 车型:\
          \ '{vehicle_model}'\")\n\n    # 5. 构建结构化输出\n    metadata_filter = None\n\
          \    # 只有当 vehicle_model 是一个非空字符串时，才创建元数据过滤器\n    if vehicle_model and isinstance(vehicle_model,\
          \ str) and vehicle_model.strip():\n        metadata_filter = {\n       \
          \     \"vehicle_model\": vehicle_model.strip()  # 使用 strip() 移除潜在的前后空格\n\
          \        }\n        print(f\"[Parser Log] 已创建元数据过滤器: {metadata_filter}\"\
          )\n    else:\n        print(\"[Parser Log] 未提取到有效车型，不应用元数据过滤器。\")\n\n  \
          \  final_output = {\n        \"database_id\": knowledge_base_id,\n     \
          \   \"metadata_filter\": metadata_filter\n    }\n    \n    print(f\"[Parser\
          \ Log] 最终输出已准备好: {final_output}\")\n    \n    return final_output\n\n"
