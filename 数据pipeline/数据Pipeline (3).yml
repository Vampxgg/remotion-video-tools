    - data:
        code: "# Dify 智能代码节点：多源数据智能聚合器\n\nimport json\nimport re\nfrom typing import\
          \ Any, Dict, List, Union, Optional, Tuple\nimport json_repair\n\n# ==============================================================================\n\
          #  模块 1: 核心智能解析器 (复用并保持健壮性)\n# ==============================================================================\n\
          def _intelligent_parse_input(raw_input: Any) -> Union[Dict, List]:\n   \
          \ \"\"\"\n    接收任意输入，智能地将其解析为 Python 对象 (dict或list)。\n    如果输入是字符串，则使用强大的\
          \ JSON 修复和提取逻辑。\n    \"\"\"\n    if isinstance(raw_input, (dict, list)):\n\
          \        return raw_input # 已经是目标类型，直接返回\n    \n    if not isinstance(raw_input,\
          \ str):\n        raise TypeError(f\"输入类型不受支持: {type(raw_input).__name__}\"\
          )\n        \n    if not raw_input.strip():\n        raise ValueError(\"\
          输入字符串为空\")\n\n    # --- 尝试直接修复和解析整个字符串 ---\n    try:\n        return json_repair.loads(raw_input)\n\
          \    except Exception:\n        pass # 如果失败，则进入更复杂的提取模式\n\n    # --- 在复杂文本中寻找最重要的\
          \ JSON 块 ---\n    potential_json_strings = re.findall(r'(\\{[\\s\\S]*\\\
          }|\\[[\\s\\S]*\\])', raw_input)\n    if not potential_json_strings:\n  \
          \      raise ValueError(\"在输入文本中未能找到任何潜在的 JSON 结构\")\n\n    valid_jsons\
          \ = []\n    for candidate in potential_json_strings:\n        try:\n   \
          \         valid_jsons.append(json_repair.loads(candidate))\n        except\
          \ Exception:\n            continue\n            \n    if not valid_jsons:\n\
          \        raise ValueError(\"找到了潜在的JSON结构，但没有一个可以被成功解析\")\n\n    return max(valid_jsons,\
          \ key=lambda x: len(json.dumps(x, ensure_ascii=False)))\n\n# ==============================================================================\n\
          #  模块 2: 动态 ID 识别与数据合并逻辑 (智能核心)\n# ==============================================================================\n\
          def _discover_id_key_and_value(obj: Dict[str, Any]) -> Optional[Tuple[str,\
          \ Any]]:\n    \"\"\"\n    智能地从一个对象中推断出哪个键是ID键。\n    启发式规则：ID键的值通常是字符串或数字，而不是列表或字典。\n\
          \    并且键名不符合常见的数据集合模式 (如 _queries, _data, _results)。\n    \"\"\"\n    #\
          \ 常见的非ID键名模式\n    non_id_patterns = ['_queries', '_data', '_results', '_list',\
          \ '_info']\n    \n    for key, value in obj.items():\n        if isinstance(value,\
          \ (str, int, float)) and not any(pattern in key for pattern in non_id_patterns):\n\
          \            return key, value\n    return None\n\ndef _merge_and_clean_data(\n\
          \    parsed_inputs: List[List[Dict]], \n    keys_to_remove_patterns: List[str]\n\
          ) -> List[Dict]:\n    \"\"\"\n    聚合来自不同输入源的数据、合并对象并清理指定字段。\n    \"\"\"\n\
          \    merged_objects_map: Dict[Any, Dict] = {}\n    id_key_name: Optional[str]\
          \ = None\n\n    for data_list in parsed_inputs:\n        if not isinstance(data_list,\
          \ list): \n            print(f\"警告: 跳过一个非列表类型的已解析输入: {type(data_list).__name__}\"\
          )\n            continue\n\n        for item in data_list:\n            if\
          \ not isinstance(item, dict): continue\n\n            # --- 动态识别ID ---\n\
          \            id_info = _discover_id_key_and_value(item)\n            if\
          \ not id_info: continue  # 如果找不到ID，跳过此项\n            \n            current_id_key,\
          \ current_id_value = id_info\n            \n            # 锁定第一个成功识别的ID键名作为全局标准\n\
          \            if id_key_name is None:\n                id_key_name = current_id_key\n\
          \            \n            # 如果后续项的ID键名与标准不符，则跳过（或发出警告）\n            elif\
          \ current_id_key != id_key_name:\n                print(f\"警告: 项 {item}\
          \ 使用了不同的ID键 '{current_id_key}'，期望是 '{id_key_name}'。已跳过。\")\n           \
          \     continue\n\n            # --- 合并数据 ---\n            # .setdefault\
          \ 会在ID首次出现时创建一个空字典\n            target_obj = merged_objects_map.setdefault(current_id_value,\
          \ {})\n            # .update 会将当前项的所有键值对合并到目标对象中，覆盖旧值\n            target_obj.update(item)\n\
          \n    # --- 清理与格式化输出 ---\n    final_result: List[Dict] = []\n    # 移除_queries字段\n\
          \    for merged_obj in merged_objects_map.values():\n        keys_to_delete\
          \ = {\n            key for key in merged_obj \n            if any(pattern\
          \ in key for pattern in keys_to_remove_patterns)\n        }\n        for\
          \ key in keys_to_delete:\n            del merged_obj[key]\n        final_result.append(merged_obj)\n\
          \        \n    return final_result\n\n# ==============================================================================\n\
          #  模块 3: Dify 主执行函数\n# ==============================================================================\n\
          def main(**kwargs: Any) -> Dict[str, List[Dict]]:\n    \"\"\"\n    Dify\
          \ 代码执行节点主函数 - 【全智能数据聚合器】\n    \n    接收 n 条分支的数据流，根据动态识别的ID进行合并，清理指定字段，\n\
          \    并输出一个统一、干净的数据列表。\n    \"\"\"\n    # 如果没有任何输入，直接返回\n    if not kwargs:\n\
          \        return {\"merged_data\": []}\n\n    # 步骤 1: 遍历所有输入，并使用智能解析器处理\n\
          \    parsed_inputs = []\n    for key, raw_input in kwargs.items():\n   \
          \     try:\n            parsed_obj = _intelligent_parse_input(raw_input)\n\
          \            parsed_inputs.append(parsed_obj)\n        except Exception\
          \ as e:\n            # 记录解析错误，但允许工作流继续\n            print(f\"警告: 解析输入 '{key}'\
          \ 失败: {e}. 该输入将被忽略。\")\n            print(f\"原始输入 (前200字符): {str(raw_input)[:200]}\"\
          )\n\n    # 步骤 2: 定义要清理的字段模式\n    # 【可配置】: 如果未来有更多需要移除的字段，只需在此列表中添加模式\n \
          \   keys_to_remove_patterns = [\"_queries\"]\n\n    # 步骤 3: 执行核心的合并与清理逻辑\n\
          \    try:\n        merged_data = _merge_and_clean_data(parsed_inputs, keys_to_remove_patterns)\n\
          \    except Exception as e:\n        # 捕获合并阶段的未知错误，提供调试信息\n        raise\
          \ RuntimeError(f\"数据合并过程中发生严重错误: {e}\")\n\n    # 步骤 4: 以 Dify 要求的格式返回最终结果\n\
          \    return {\"merged_data\": merged_data}\n\n"
