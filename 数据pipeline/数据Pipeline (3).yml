    - data:
        code: "# Dify 依赖管理: json-repair (可选，但建议添加)\nimport json\nimport traceback\n\
          from typing import Any, Dict, List, Union\nfrom copy import deepcopy\n\n\
          # 建议在Dify依赖中添加 json_repair\ntry:\n    import json_repair\nexcept ImportError:\n\
          \    class JsonRepairWrapper:\n        def loads(self, s: str, *args, **kwargs)\
          \ -> Any:\n            return json.loads(s, *args, **kwargs)\n    json_repair\
          \ = JsonRepairWrapper()\n\n\n# --- 1. 健壮的输入解析模块 (无需修改，可复用) ---\n\ndef _parse_input_as_dict(raw_input:\
          \ Any) -> Dict[str, Any]:\n    \"\"\"\n    【目标明确】通用的、健壮的输入解析器，确保输出是一个字典。\n\
          \    \"\"\"\n    if isinstance(raw_input, dict):\n        return raw_input\n\
          \    \n    if isinstance(raw_input, str):\n        if not raw_input.strip():\n\
          \             return {} # 空字符串解析为空字典\n        try:\n            data = json_repair.loads(raw_input)\n\
          \            if isinstance(data, dict):\n                return data\n \
          \           else:\n                raise ValueError(f\"解析出的JSON类型为 {type(data).__name__},\
          \ 但期望的是对象(dict)。\")\n        except Exception as e:\n            raise ValueError(f\"\
          无法将输入字符串解析为对象(dict): {e}\")\n            \n    raise TypeError(f\"期望的输入类型是\
          \ dict 或其JSON字符串表示, 但收到了 {type(raw_input).__name__}\")\n\n\n# --- 2. Dify\
          \ 节点主入口 (【核心重构】) ---\n\ndef main(base_array: Any, scraped_datas_input: Any)\
          \ -> Dict[str, Any]:\n    \"\"\"\n    Dify 主函数：\n    将抓取到的数据列表（scraped_datas_input）合并到基础对象列表（base_array）中。\n\
          \    \"\"\"\n    try:\n        # 步骤 1: 解析输入\n        print(\"▶️ [Phase 1/3]\
          \ Parsing Inputs...\")\n        \n        # 解析 base_array\n        if isinstance(base_array,\
          \ list):\n            parsed_base_list = base_array\n        elif isinstance(base_array,\
          \ str):\n            if not base_array.strip():\n                parsed_base_list\
          \ = []\n            else:\n                try:\n                    parsed_base_list\
          \ = json_repair.loads(base_array)\n                except:\n           \
          \         parsed_base_list = []\n        else:\n            parsed_base_list\
          \ = []\n            \n        if not isinstance(parsed_base_list, list):\n\
          \            # 如果解析出来不是列表（比如是单个对象），尝试转为列表\n            if isinstance(parsed_base_list,\
          \ dict):\n                parsed_base_list = [parsed_base_list]\n      \
          \      else:\n                parsed_base_list = []\n\n        # 解析 scraped_datas_input\n\
          \        # 这里的输入可能是 {\"scraped_datas\": [...]} 或 {\"datas\": [...]} 这种结构，也可能是直接的列表\n\
          \        parsed_scraped_list = []\n        if isinstance(scraped_datas_input,\
          \ list):\n            parsed_scraped_list = scraped_datas_input\n      \
          \  elif isinstance(scraped_datas_input, str):\n            if not scraped_datas_input.strip():\n\
          \                parsed_scraped_list = []\n            else:\n         \
          \       try:\n                    parsed_scraped_data = json_repair.loads(scraped_datas_input)\n\
          \                    if isinstance(parsed_scraped_data, list):\n       \
          \                 parsed_scraped_list = parsed_scraped_data\n          \
          \          elif isinstance(parsed_scraped_data, dict):\n               \
          \         # 尝试多种可能的键名\n                        if \"scraped_datas\" in parsed_scraped_data\
          \ and isinstance(parsed_scraped_data[\"scraped_datas\"], list):\n      \
          \                       parsed_scraped_list = parsed_scraped_data[\"scraped_datas\"\
          ]\n                        elif \"datas\" in parsed_scraped_data and isinstance(parsed_scraped_data[\"\
          datas\"], list):\n                             parsed_scraped_list = parsed_scraped_data[\"\
          datas\"]\n                        else:\n                             parsed_scraped_list\
          \ = [parsed_scraped_data]\n                    else:\n                 \
          \        parsed_scraped_list = []\n                except:\n           \
          \         parsed_scraped_list = []\n        elif isinstance(scraped_datas_input,\
          \ dict):\n            if \"scraped_datas\" in scraped_datas_input and isinstance(scraped_datas_input[\"\
          scraped_datas\"], list):\n                 parsed_scraped_list = scraped_datas_input[\"\
          scraped_datas\"]\n            elif \"datas\" in scraped_datas_input and\
          \ isinstance(scraped_datas_input[\"datas\"], list):\n                 parsed_scraped_list\
          \ = scraped_datas_input[\"datas\"]\n            else:\n                \
          \ parsed_scraped_list = [scraped_datas_input]\n        else:\n         \
          \    parsed_scraped_list = []\n\n        print(f\"  - ✅ Parsed base list:\
          \ {len(parsed_base_list)} items.\")\n        print(f\"  - ✅ Parsed scraped\
          \ list: {len(parsed_scraped_list)} items.\")\n\n        # 步骤 2: 合并逻辑\n \
          \       print(\"\U0001F504 [Phase 2/3] Merging Data...\")\n        enriched_results\
          \ = []\n        \n        # 确保两个列表长度一致，或者根据索引对应合并\n        # 如果 base_list\
          \ 为空，则直接使用 scraped_list 构造结果\n        # 如果 scraped_list 为空，则保留 base_list\n\
          \        \n        max_len = max(len(parsed_base_list), len(parsed_scraped_list))\n\
          \        \n        for i in range(max_len):\n            # 获取 base 对象\n\
          \            base_obj = parsed_base_list[i] if i < len(parsed_base_list)\
          \ else {}\n            if not isinstance(base_obj, dict): base_obj = {}\n\
          \            \n            # 获取 scraped 对象\n            scraped_obj = parsed_scraped_list[i]\
          \ if i < len(parsed_scraped_list) else {}\n            if not isinstance(scraped_obj,\
          \ dict): scraped_obj = {}\n            \n            # 合并\n            enriched_item\
          \ = base_obj.copy()\n            \n            # 如果 scraped_obj 内部还有 scraped_datas/datas\
          \ 字段（嵌套情况），尝试提取出来\n            # 优先检查 scraped_datas，然后是 datas\n        \
          \    inner_data = None\n            if \"scraped_datas\" in scraped_obj:\n\
          \                inner_data = scraped_obj[\"scraped_datas\"]\n         \
          \   elif \"datas\" in scraped_obj:\n                inner_data = scraped_obj[\"\
          datas\"]\n            \n            if inner_data is not None:\n       \
          \          # 这是一个兼容性处理，防止多层嵌套\n                 if isinstance(inner_data,\
          \ dict):\n                     enriched_item['web_data'] = deepcopy(inner_data)\n\
          \                 elif isinstance(inner_data, list) and len(inner_data)\
          \ > 0:\n                     enriched_item['web_data'] = deepcopy(inner_data[0])\n\
          \                 else:\n                     enriched_item['web_data']\
          \ = deepcopy(scraped_obj)\n            else:\n                 enriched_item['web_data']\
          \ = deepcopy(scraped_obj)\n            \n            # 移除 web_queries\n\
          \            enriched_item.pop(\"web_queries\", None)\n            \n  \
          \          enriched_results.append(enriched_item)\n\n        print(f\"✅\
          \ Data merged successfully. Total items: {len(enriched_results)}\")\n\n\
          \        # 步骤 3: 格式化输出\n        print(\"\U0001F4E6 [Phase 3/3] Formatting\
          \ Output...\")\n        output_str = json.dumps(enriched_results, ensure_ascii=False,\
          \ indent=2)\n        \n        return {\n            \"enriched_objects\"\
          : enriched_results,\n            \"enriched_objects_str\": output_str\n\
          \        }\n\n    except Exception as e:\n        print(f\"\U0001F4A5 UNEXPECTED\
          \ ERROR: {e}\\n{traceback.format_exc()}\")\n        error_payload = {\n\
          \            \"error\": \"NODE_EXECUTION_ERROR\",\n            \"message\"\
          : str(e),\n            \"traceback\": traceback.format_exc()\n        }\n\
          \        return {\n            \"enriched_objects\": [error_payload],\n\
          \            \"enriched_objects_str\": json.dumps([error_payload], ensure_ascii=False,\
          \ indent=2)\n        }\n\n"
