    - data:
        code: "import requests\nimport json\nfrom typing import List, Dict, Any, Optional\n\
          \ndef get_all_documents(base_url: str, knowledge_base_id: str, api_key:\
          \ str) -> List[Dict[str, Any]]:\n    \"\"\"\n    辅助函数：通过分页获取知识库中的所有文档。\n\
          \    \"\"\"\n    all_documents = []\n    page = 1\n    has_more = True\n\
          \    url = f\"http://{base_url}/v1/datasets/{knowledge_base_id}/documents\"\
          \n    headers = {'Authorization': f'Bearer {api_key}'}\n\n    print(f\"\
          Dify Log: 开始从 {url} 获取文档...\")\n\n    while has_more:\n        params =\
          \ {'page': page, 'limit': 100} # 使用较大的 limit 减少请求次数\n        try:\n    \
          \        response = requests.get(url, headers=headers, params=params, timeout=30)\n\
          \            response.raise_for_status()  # 如果请求失败 (例如 401, 404), 抛出异常\n\
          \            \n            data = response.json()\n            documents_on_page\
          \ = data.get('data', [])\n            all_documents.extend(documents_on_page)\n\
          \            has_more = data.get('has_more', False)\n            \n    \
          \        print(f\"Dify Log: 成功获取第 {page} 页，找到 {len(documents_on_page)} 个文档。Has\
          \ More: {has_more}\")\n            page += 1\n\n        except requests.exceptions.HTTPError\
          \ as http_err:\n            print(f\"Dify Log: HTTP 错误: {http_err} | 响应:\
          \ {response.text}\")\n            raise  # 抛出异常，让主函数捕获\n        except requests.exceptions.RequestException\
          \ as req_err:\n            print(f\"Dify Log: 请求发生错误: {req_err}\")\n   \
          \         raise # 抛出异常，让主函数捕获\n            \n    print(f\"Dify Log: 文档获取完成，总共获取\
          \ {len(all_documents)} 个文档记录。\")\n    return all_documents\n\ndef process_documents(documents:\
          \ List[Dict[str, Any]]) -> Dict[str, Any]:\n    \"\"\"\n    辅助函数：处理文档列表，过滤并格式化输出。\n\
          \    \"\"\"\n    doc_info_list_for_llm = []\n    available_doc_ids = []\n\
          \n    print(\"Dify Log: 开始处理和过滤文档...\")\n\n    for doc in documents:\n \
          \       # 使用 'display_status' == 'available' 作为最可靠的判断标准\n        if doc.get('display_status')\
          \ == 'available' and doc.get('enabled') is True:\n            doc_id = doc.get('id')\n\
          \            doc_name = doc.get('name')\n            \n            if not\
          \ doc_id or not doc_name:\n                continue\n\n            available_doc_ids.append(doc_id)\n\
          \            \n            # 提取并格式化自定义元数据\n            metadata_parts =\
          \ []\n            doc_metadata = doc.get('doc_metadata', [])\n         \
          \   if doc_metadata:\n                for meta in doc_metadata:\n      \
          \              if meta.get('id') != 'built-in': # 忽略内置元数据\n            \
          \            meta_name = meta.get('name', 'N/A')\n                     \
          \   meta_value = meta.get('value', 'N/A')\n                        metadata_parts.append(f\"\
          {meta_name}: {meta_value}\")\n            \n            metadata_str = \"\
          , \".join(metadata_parts)\n            \n            # 构建单条文档的描述字符串\n  \
          \          if metadata_str:\n                doc_string = f\"ID: {doc_id},\
          \ 名称: {doc_name}, (元数据: {metadata_str})\"\n            else:\n         \
          \       doc_string = f\"ID: {doc_id}, 名称: {doc_name}\"\n            doc_info_list_for_llm.append(doc_string)\n\
          \n    print(f\"Dify Log: 文档处理完成，筛选出 {len(available_doc_ids)} 个可用文档。\")\n\
          \    return {\n        \"llm_string\": \"\\n\".join(doc_info_list_for_llm),\n\
          \        \"available_ids\": available_doc_ids\n    }\n\ndef main(knowledge_base_id:\
          \ str, dify_api_key: str, dify_base_url: str) -> Dict[str, Any]:\n    \"\
          \"\"\n    Dify 代码节点主入口函数。\n    获取、过滤并格式化指定知识库的文档列表。\n    \"\"\"\n    print(f\"\
          Dify Log: 开始执行文档列表获取任务，知识库ID: {knowledge_base_id}\")\n    \n    # --- 1.\
          \ 输入验证 ---\n    if not all([knowledge_base_id, dify_api_key, dify_base_url]):\n\
          \        error_message = \"Dify Log: 错误 - 缺少必要的输入参数 (knowledge_base_id,\
          \ dify_api_key, dify_base_url)。\"\n        print(error_message)\n      \
          \  return {\n            \"document_list_string\": error_message,\n    \
          \        \"document_info_obj\": {\"error\": error_message, \"available_doc_ids\"\
          : []}\n        }\n    \n    # 清理一下URL，防止末尾有斜杠\n    if dify_base_url.endswith('/'):\n\
          \        dify_base_url = dify_base_url[:-1]\n\n    try:\n        # --- 2.\
          \ 获取所有文档 ---\n        all_documents = get_all_documents(dify_base_url, knowledge_base_id,\
          \ dify_api_key)\n        \n        # --- 3. 处理并格式化文档 ---\n        processed_data\
          \ = process_documents(all_documents)\n        \n        # --- 4. 准备最终输出\
          \ ---\n        final_string_output = processed_data[\"llm_string\"]\n  \
          \      if not final_string_output:\n            final_string_output = \"\
          Dify Log: 知识库中没有找到可用的文档。\"\n        \n        final_obj_output = {\n   \
          \         \"available_doc_ids\": processed_data[\"available_ids\"],\n  \
          \          \"total_available_docs\": len(processed_data[\"available_ids\"\
          ]),\n            \"error\": None\n        }\n        \n        print(f\"\
          Dify Log: 任务成功完成。\")\n        return {\n            \"document_list_string\"\
          : final_string_output,\n            \"document_info_obj\": final_obj_output\n\
          \        }\n\n    except Exception as e:\n        error_message = f\"Dify\
          \ Log: 执行过程中发生严重错误: {e}\"\n        print(error_message)\n        return\
          \ {\n            \"document_list_string\": error_message,\n            \"\
          document_info_obj\": {\"error\": str(e), \"available_doc_ids\": []}\n  \
          \      }\n"
