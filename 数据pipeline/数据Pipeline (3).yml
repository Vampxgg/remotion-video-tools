    - data:
        code: "# coding: utf-8\nimport asyncio\nimport httpx\nimport os\nimport pprint\n\
          from typing import Dict, Any, List, Optional, Set, Tuple\nfrom collections\
          \ import defaultdict\n\n\n# --- 配置管理 ---\nclass Config:\n    # 替换为您的实际配置\n\
          \    BASE_IP = os.getenv(\"DIFY_API_BASE_IP\", \"119.45.167.133:5125\")\n\
          \    AUTH_TOKEN = os.getenv(\"DIFY_API_AUTH_TOKEN\", \"dataset-pJ11Qq6BAfhYR4AJfLGtulbv\"\
          )\n    SILICONFLOW_API_KEY = os.getenv(\"SILICONFLOW_API_KEY\", \"sk-zdxzbykdzqbmpjlnasfjpapuzdkupupghxsaopftaqnvyfrv\"\
          )\n    SILICONFLOW_RERANK_URL = \"https://api.siliconflow.cn/v1/rerank\"\
          \n    RERANK_MODEL = \"BAAI/bge-reranker-v2-m3\"\n    IS_DEBUG = True\n\
          \    TIMEOUT = 45\n\n\n# --- 调试辅助 ---\ndef debug_print(data: Any, label:\
          \ str = \"DEBUG\"):\n    if Config.IS_DEBUG:\n        print(f\"\\n{'=' *\
          \ 30} {label} {'=' * 30}\")\n        pprint.pprint(data, indent=2, width=120)\n\
          \        print(\"=\" * 70 + \"\\n\")\n    return data\n\n\n# --- 模块一：Dify\
          \ API 客户端 ---\nclass DifyApiClient:\n    \"\"\"负责与 Dify Dataset 服务通信，并清洗数据\"\
          \"\"\n\n    def __init__(self):\n        self.base_url = f\"http://{Config.BASE_IP}/v1/datasets\"\
          \n        self.headers = {\n            'Authorization': f'Bearer {Config.AUTH_TOKEN}',\n\
          \            'Content-Type': 'application/json'\n        }\n        self.client\
          \ = httpx.AsyncClient(headers=self.headers, timeout=Config.TIMEOUT)\n\n\
          \    async def close(self):\n        if not self.client.is_closed:\n   \
          \         await self.client.aclose()\n\n    async def fetch_document_detail(self,\
          \ database_id: str, document_id: str) -> Dict[str, Any]:\n        url =\
          \ f\"{self.base_url}/{database_id}/documents/{document_id}\"\n        try:\n\
          \            resp = await self.client.get(url)\n            resp.raise_for_status()\n\
          \            return resp.json()\n        except Exception as e:\n      \
          \      print(f\"⚠️ [Meta Error] DB: {database_id}, Doc: {document_id} -\
          \ {e}\")\n            return {}\n\n    async def fetch_all_segments(self,\
          \ database_id: str, document_id: str) -> List[Dict]:\n        \"\"\"通过分页循环，获取一个文档下的所有切片\"\
          \"\"\n        all_segments = []\n        page = 1\n        # 注意：这里的 URL\
          \ 需要根据您的 Dify 版本确认。\n        # 原代码逻辑是 /datasets/{db}/documents/{doc}/segments\n\
          \        url = f\"{self.base_url}/{database_id}/documents/{document_id}/segments\"\
          \n\n        while True:\n            params = {'limit': 100, 'page': page}\
          \  # Dify 最大 limit 通常是 100\n            try:\n                resp = await\
          \ self.client.get(url, params=params)\n                resp.raise_for_status()\n\
          \                data = resp.json()\n\n                segments = data.get(\"\
          data\", [])\n                if not segments: break\n\n                all_segments.extend(segments)\n\
          \n                if not data.get(\"has_more\", False):\n              \
          \      break\n                page += 1\n            except Exception as\
          \ e:\n                print(f\"⚠️ [Fetch Segments Error] DB:{database_id}\
          \ Doc:{document_id} Page:{page} - {e}\")\n                break\n\n    \
          \    return all_segments\n\n    async def retrieve(self, query: str, payload:\
          \ Dict[str, Any]) -> List[Dict[str, Any]]:\n        # 提取 Dify 接口需要的 Database\
          \ ID\n        db_id = payload.pop(\"database_id_for_url\")\n        url\
          \ = f\"{self.base_url}/{db_id}/retrieve\"\n\n        # 构造 Dify 标准请求体\n \
          \       req_body = {\n            \"query\": query,\n            \"retrieval_model\"\
          : {\n                \"search_method\": \"hybrid_search\",\n           \
          \     \"reranking_enable\": False,\n                \"top_k\": 100,  # 尽可能多召回，让后续\
          \ RRF 和外部 Rerank 决定排名\n                \"score_threshold_enabled\": False,\n\
          \            }\n        }\n        if \"metadata_filtering_conditions\"\
          \ in payload:\n            req_body[\"retrieval_model\"][\"metadata_filtering_conditions\"\
          ] = payload[\"metadata_filtering_conditions\"]\n\n        try:\n       \
          \     resp = await self.client.post(url, json=req_body)\n            resp.raise_for_status()\n\
          \            data = resp.json()\n\n            # 数据清洗：将 Dify 复杂的嵌套结构扁平化\n\
          \            clean_results = []\n            for rec in data.get(\"records\"\
          , []):\n                seg = rec.get(\"segment\", {})\n               \
          \ d = seg.get(\"document\", {})\n                if seg.get(\"content\"\
          ):\n                    clean_results.append({\n                       \
          \ \"id\": seg.get(\"id\"),\n                        \"chunk_id\": seg.get(\"\
          id\"),  # 关键 ID，用于去重\n                        \"content\": seg.get(\"content\"\
          , \"\"),\n                        \"score\": rec.get(\"score\", 0.0),  #\
          \ 原始分数\n                        \"database_id\": db_id,\n              \
          \          \"document_id\": seg.get(\"document_id\"),\n                \
          \        \"document_name\": d.get(\"name\"),\n                        \"\
          position\": seg.get(\"position\", 0),\n                        \"doc_metadata\"\
          : d.get(\"doc_metadata\") or d.get(\"metadata\") or {}\n               \
          \     })\n            return clean_results\n        except Exception as\
          \ e:\n            print(f\"⚠️ [Retrieve Error] Query: '{query}' - {e}\"\
          )\n            return []\n\n\n# --- 模块二：RAG 服务 (算法核心) ---\nclass RagService:\n\
          \    @staticmethod\n    def reciprocal_rank_fusion(list_of_lists: List[List[Dict]],\
          \ k: int = 60) -> List[Dict]:\n        \"\"\"\n        【修正版 RRF】\n     \
          \   输入：List[List[Dict]] -> 包含多个 Query 检索结果的列表\n        逻辑：平行投票。每个列表的第 n\
          \ 名享有同等的权重。\n        \"\"\"\n        scores = defaultdict(float)\n     \
          \   obj_map = {}\n\n        # 外层循环：遍历不同的 Query 来源 (Q1, Q2, Q3...)\n    \
          \    for ranked_list in list_of_lists:\n            if not ranked_list:\
          \ continue\n\n            # 内层循环：遍历该 Query 下的排名\n            for rank, item\
          \ in enumerate(ranked_list):\n                cid = item.get('chunk_id')\n\
          \                if not cid: continue\n\n                # 记录对象以便最后返回\n\
          \                if cid not in obj_map:\n                    obj_map[cid]\
          \ = item\n\n                # 累加 RRF 分数\n                scores[cid] +=\
          \ 1.0 / (k + rank)\n\n        # 按融合分数降序排列\n        sorted_ids = sorted(scores.keys(),\
          \ key=lambda x: scores[x], reverse=True)\n        return [obj_map[uid] for\
          \ uid in sorted_ids]\n\n    @staticmethod\n    async def compute_rerank_scores(query:\
          \ str, chunks: List[Dict]) -> List[Dict]:\n        \"\"\"\n        【优化版\
          \ Rerank】\n        1. 使用 httpx 异步调用，不阻塞。\n        2. 全量打分 (top_n = len)，不进行截断，将截断权交给下游业务。\n\
          \        \"\"\"\n        if not chunks: return []\n\n        # 限制单次最大打分数量，防止\
          \ HTTP 包过大 (可按需调整)\n        candidates = chunks[:100]\n        doc_contents\
          \ = [c[\"content\"] for c in candidates]\n\n        payload = {\n      \
          \      \"model\": Config.RERANK_MODEL,\n            \"query\": query,\n\
          \            \"documents\": doc_contents,\n            \"return_documents\"\
          : False,\n            \"top_n\": len(doc_contents)  # 关键：返回所有候选的分数\n   \
          \     }\n        headers = {\n            \"Authorization\": f\"Bearer {Config.SILICONFLOW_API_KEY}\"\
          ,\n            \"Content-Type\": \"application/json\"\n        }\n\n   \
          \     try:\n            # 使用临时 Client 或单例 Client 均可，此处使用上下文管理器确保连接关闭\n \
          \           async with httpx.AsyncClient(timeout=30) as temp_client:\n \
          \               resp = await temp_client.post(Config.SILICONFLOW_RERANK_URL,\
          \ json=payload, headers=headers)\n                resp.raise_for_status()\n\
          \                data = resp.json()\n\n            results = data.get(\"\
          results\", [])\n\n            # 将新分数回填入 Chunk 对象\n            scored_chunks\
          \ = []\n            for item in results:\n                original_idx =\
          \ item[\"index\"]\n                new_score = item[\"relevance_score\"\
          ]\n\n                chunk = candidates[original_idx].copy()\n         \
          \       chunk[\"score\"] = round(new_score, 4)  # 更新为模型重排分\n           \
          \     scored_chunks.append(chunk)\n\n            return scored_chunks  #\
          \ 返回已打分的列表，顺序通常已经是降序\n\n        except Exception as e:\n            print(f\"\
          ⚠️ [Rerank Failed] {e}. Falling back to RRF results.\")\n            # 降级策略：如果重排失败，直接返回原始列表（保留\
          \ RRF 排序）\n            return chunks\n\n\n# --- 模块三：流程编排器 (业务逻辑) ---\nclass\
          \ RetrievalOrchestrator:\n    def __init__(self, api_client: DifyApiClient):\n\
          \        self.api = api_client\n        self.doc_meta_cache = {}  # 缓存 (db_id,\
          \ doc_id) -> Detail info\n\n    async def prefetch_metadata(self, tasks:\
          \ List[Dict]):\n        \"\"\"Stage 0: 预加载文档元数据，减少后续循环中的 API 调用\"\"\"\n\
          \        print(\"\U0001F680 [Init] Prefetching document metadata...\")\n\
          \        needed = set()\n        for t in tasks:\n            if t.get(\"\
          document_id\") and t.get(\"database_id\"):\n                needed.add((t[\"\
          database_id\"], t[\"document_id\"]))\n\n        if not needed: return\n\n\
          \        # 并发获取\n        coros = [self.api.fetch_document_detail(db, doc)\
          \ for db, doc in needed]\n        results = await asyncio.gather(*coros,\
          \ return_exceptions=True)\n\n        for (key, detail) in zip(needed, results):\n\
          \            if detail:\n                self.doc_meta_cache[key] = detail\n\
          \n            # 1. 提取 Ugly List -> Clean Dict\n            raw_meta_list\
          \ = detail.get(\"doc_metadata\", [])\n            clean_meta = ContentFormatter.clean_metadata(raw_meta_list)\n\
          \            # 2. 补充 Root Level 的关键信息到 metadata 中 (比如 doc_form)\n      \
          \      # 有时候 document info 在外面，不在 doc_metadata list 里\n            if \"\
          doc_form\" in detail:\n                clean_meta[\"doc_form\"] = detail[\"\
          doc_form\"]\n\n            # 3. 构造极简 Cache 对象\n            self.doc_meta_cache[key]\
          \ = {\n                \"id\": detail.get(\"id\"),\n                \"name\"\
          : detail.get(\"name\"),\n                \"doc_metadata\": clean_meta, \
          \ # 只有这是一个干净的字典\n                \"_source\": \"api_detail\"  # 标记来源\n \
          \           }\n        print(self.doc_meta_cache)\n\n    def build_execution_plan(self,\
          \ tasks: List[Dict]) -> List[Dict]:\n        \"\"\"Stage 1: 构建高效检索计划，合并相同\
          \ DB 的请求\"\"\"\n        # 数据结构: db_id -> {doc_names: set, include_full:\
          \ bool}\n        plan_map = defaultdict(lambda: {\"doc_names\": set(), \"\
          include_full\": False})\n\n        for t in tasks:\n            db = t.get(\"\
          database_id\")\n            if not db: continue\n\n            mode = t.get(\"\
          retrieval_mode\")\n            if mode == \"segment_retrieval\":\n     \
          \           d_id = t.get(\"document_id\")\n                # 从缓存中拿名字 (Dify\
          \ 过滤依赖名字)\n                meta = self.doc_meta_cache.get((db, d_id))\n\
          \                if meta and meta.get(\"name\"):\n                    plan_map[db][\"\
          doc_names\"].add(meta[\"name\"])\n            elif mode == \"full_database_retrieval\"\
          :\n                plan_map[db][\"include_full\"] = True\n\n        # 生成实际的\
          \ Job Payloads\n        jobs = []\n        for db_id, constraints in plan_map.items():\n\
          \            # Job A: 带 Metadata Filter 的检索 (针对指定文档)\n            if constraints[\"\
          doc_names\"]:\n                names = list(constraints[\"doc_names\"])\n\
          \                filter_cond = {\n                    \"logical_operator\"\
          : \"or\" if len(names) > 1 else \"and\",\n                    \"conditions\"\
          : [{\"name\": \"document_name\", \"comparison_operator\": \"is\", \"value\"\
          : n} for n in names]\n                }\n                jobs.append({\n\
          \                    \"database_id_for_url\": db_id,\n                 \
          \   \"metadata_filtering_conditions\": filter_cond\n                })\n\
          \n            # Job B: 全库检索 (如果需要)\n            if constraints[\"include_full\"\
          ]:\n                jobs.append({\"database_id_for_url\": db_id})\n\n  \
          \      return jobs\n\n    def _inject_metadata_from_search_results(self,\
          \ chunks: List[Dict]):\n        \"\"\"从搜索结果注入时，也保持结构一致\"\"\"\n        for\
          \ c in chunks:\n            key = (c[\"database_id\"], c[\"document_id\"\
          ])\n            existing = self.doc_meta_cache.get(key)\n\n            #\
          \ 如果已有全量详情，跳过\n            if existing and existing.get(\"_source\") ==\
          \ \"api_detail\":\n                continue\n            # 注入搜索快照\n    \
          \        if c.get(\"doc_metadata\") or c.get(\"document_name\"):\n     \
          \           # 注意 retrieve 应该已经把 c[\"doc_metadata\"] 洗成字典了\n            \
          \    self.doc_meta_cache[key] = {\n                    \"id\": c[\"document_id\"\
          ],\n                    \"name\": c[\"document_name\"],\n              \
          \      \"doc_metadata\": c[\"doc_metadata\"],  # 也是干净的字典\n             \
          \       \"_source\": \"retrieve_snapshot\"\n                }\n\n    def\
          \ distribute_chunks_to_tasks(self, scored_chunks: List[Dict], tasks: List[Dict])\
          \ -> List[Dict]:\n        \"\"\"\n        Stage 4: 库存分发 (Inventory Slicing)\n\
          \        将打好分的大列表，按照 Task 的需求（文档ID、TopK）分发出去。\n        \"\"\"\n        #\
          \ 1. 建立库存索引：DB -> Doc -> Chunks\n        inventory = defaultdict(lambda:\
          \ defaultdict(list))\n        for c in scored_chunks:\n            inventory[c['database_id']][c['document_id']].append(c)\n\
          \n        final_results = []\n        used_chunk_ids = set()  # 用于全库检索时防止重复\n\
          \n        # 2. 遍历 Task 进行“进货”\n        for task in tasks:\n            mode\
          \ = task.get(\"retrieval_mode\")\n            db = task.get(\"database_id\"\
          )\n            top_k = task.get(\"top_k\", 20)\n\n            candidates\
          \ = []\n\n            if mode == \"segment_retrieval\":\n              \
          \  # 只取特定文档的库存\n                doc_id = task.get(\"document_id\")\n   \
          \             candidates = inventory.get(db, {}).get(doc_id, [])\n\n   \
          \         elif mode == \"full_database_retrieval\":\n                # 取该\
          \ DB 下所有文档的库存\n                docs_in_db = inventory.get(db, {})\n    \
          \            for doc_chunks in docs_in_db.values():\n                  \
          \  candidates.extend(doc_chunks)\n\n            # 3. 排序并截断 (基于 Rerank 分数)\n\
          \            # 注意：candidates 是引用，这里 sort 不会影响原始库存列表的完整性，\n            #\
          \ 但为了安全，Rerank 步骤通常已经排好序了，这里只是再次确保。\n            candidates.sort(key=lambda\
          \ x: x[\"score\"], reverse=True)\n\n            # 4. 选取 Top K (带去重逻辑)\n\
          \            picked_count = 0\n            for c in candidates:\n      \
          \          if picked_count >= top_k:\n                    break\n\n    \
          \            # 如果是 segment 任务，直接拿；如果是 full 任务，避免拿重复的(如果前面 segment 任务拿过了)\n\
          \                # 注：这里的逻辑取决于：是否允许同一个 chunk 出现在不同的 Task 结果中？\n         \
          \       # 如果 Dify 要求每个 chunk 只能出现一次，保持这个 if。\n                # 如果允许不同 Task\
          \ 包含相同 chunk，可移除 check。\n                if c['chunk_id'] not in used_chunk_ids:\n\
          \                    final_results.append(c)\n                    used_chunk_ids.add(c['chunk_id'])\n\
          \                    picked_count += 1\n\n        return final_results\n\
          \n    # 在 RetrievalOrchestrator 类中更新/添加此方法\n\n    # async def process_full_document_task(self,\
          \ task: Dict) -> Dict:\n    #     \"\"\"\n    #     处理全文档任务。\n    #    \
          \ 关键点：返回的结构必须与 format_output 生成的结构完全一致（Schema Alignment）。\n    #     \"\"\
          \"\n    #     db_id = task.get(\"database_id\")\n    #     doc_id = task.get(\"\
          document_id\")\n    #\n    #     # 1. 尝试从缓存拿 Meta，拿不到就去 Fetch\n    #   \
          \  # 这里的 fetch_document_detail 内部应实现防重复请求，或者依赖外部 prefetch\n    #     doc_meta\
          \ = self.doc_meta_cache.get((db_id, doc_id))\n    #\n    #     # 2. 获取全部分段\
