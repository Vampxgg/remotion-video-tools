# docker-compose.yaml

version: '3.8' # 推荐使用较新的版本

services:
  db:
    image: postgres:15-alpine  # 使用官方的、轻量级的 postgres 镜像
    container_name: script_tools_db
    restart: always # 容器退出时总是自动重启
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      # 将宿主机的 5432 端口映射到容器的 5432 端口
      # 格式: <HOST_PORT>:<CONTAINER_PORT>
      - "5432:5432"
    volumes:
      # 数据持久化配置，将数据存储在宿主机的 ./volumes 目录下
      - ./volumes:/var/lib/postgresql/data

