          value_type: string
          variable: image_size
        - value_selector:
          - '1774505608780'
          - response_mime_type
          value_type: string
          variable: response_mime_type
        - value_selector:
          - '1774518639409'
          - reference_images
          value_type: array[object]
          variable: reference_images
      height: 52
      id: '1774518063040'
      position:
        x: 350.58467877072013
        y: 303
      positionAbsolute:
        x: 350.58467877072013
