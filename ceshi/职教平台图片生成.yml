    - data:
        code: "# -*- coding: utf-8 -*-\n\"\"\"\nDify 工作流 · 代码执行节点（Python）用：把 reference_images\
          \ 字符串转成 Array[Object]。\n\n在 Dify 中配置：\n1. 输入变量：名称 reference_images_raw，类型\
          \ String，绑定上游（如 LLM/变量聚合）的整段文本。\n2. 输出变量：名称 reference_images，类型 Array[Object]（若界面无\
          \ Object 子类型，选 Array 并保证元素为对象）。\n3. 将「Dify 粘贴区」从 import json 起粘贴到 main 函数结束（勿粘贴文件末尾\
          \ if __name__ 自测段）。\n\n下游 HTTP 请求体里引用：{{#节点名.reference_images#}} 或工作流变量映射到\
          \ generate_image 的 reference_images。\n\n输入/输出全集（表格，含全部成功分支与全部错误文案）：见同目录\
          \ `dify_code_reference_images_cases.md`。\n\"\"\"\n\n# ========== Dify 粘贴区开始\
          \ ==========\n\nimport json\nfrom typing import Any, Dict, List\n\n\ndef\
          \ _normalize_item(raw: Any, index: int) -> Dict[str, Any]:\n    if isinstance(raw,\
          \ str):\n        s = raw.strip()\n        if s.startswith(\"http://\") or\
          \ s.startswith(\"https://\"):\n            return {\"image_url\": s}\n \
          \       try:\n            raw = json.loads(s)\n        except json.JSONDecodeError\
          \ as e:\n            raise ValueError(f\"第 {index} 项不是合法 URL 或 JSON 对象字符串:\
          \ {e}\") from e\n    if not isinstance(raw, dict):\n        raise ValueError(f\"\
          第 {index} 项须为对象，实际: {type(raw).__name__}\")\n    row: Dict[str, Any] = {}\n\
          \    for k in (\"image_base64\", \"image_url\", \"gs_uri\"):\n        if\
          \ k not in raw or raw[k] is None:\n            continue\n        v = raw[k]\n\
          \        if isinstance(v, str) and not v.strip():\n            continue\n\
          \        row[k] = v\n    n = sum(1 for k in (\"image_base64\", \"image_url\"\
          , \"gs_uri\") if row.get(k))\n    if n != 1:\n        raise ValueError(\n\
          \            f\"第 {index} 项须且仅能指定 image_base64、image_url、gs_uri 之一，\"\n\
          \            f\"当前键: {list(row.keys())}\"\n        )\n    return row\n\n\
          \ndef main(reference_images_raw: Any) -> dict:\n    \"\"\"\n    :param reference_images_raw:\
          \ 字符串（JSON 数组 / 单 URL / 空）或已是 list\n    :return: {\"reference_images\":\
          \ [ {...}, ... ]}\n    \"\"\"\n    if reference_images_raw is None:\n  \
          \      return {\"reference_images\": []}\n\n    if isinstance(reference_images_raw,\
          \ list):\n        items = reference_images_raw\n    elif isinstance(reference_images_raw,\
          \ str):\n        s = reference_images_raw.strip()\n        if not s:\n \
          \           return {\"reference_images\": []}\n        if s.startswith(\"\
          [\"):\n            try:\n                parsed = json.loads(s)\n      \
          \      except json.JSONDecodeError as e:\n                raise ValueError(f\"\
          reference_images JSON 数组无效: {e}\") from e\n        elif s.startswith(\"\
          {\") and s.endswith(\"}\"):\n            try:\n                parsed =\
          \ json.loads(s)\n            except json.JSONDecodeError as e:\n       \
          \         raise ValueError(f\"reference_images JSON 无效: {e}\") from e\n\
          \        elif s.lower().startswith(\"http://\") or s.lower().startswith(\"\
          https://\"):\n            return {\"reference_images\": [{\"image_url\"\
          : s}]}\n        else:\n            try:\n                parsed = json.loads(s)\n\
          \            except json.JSONDecodeError as e:\n                raise ValueError(\n\
          \                    \"reference_images 须为 JSON 数组/对象、或单条 https URL 字符串\"\
          \n                ) from e\n        items = parsed\n    else:\n        raise\
          \ ValueError(\n            f\"reference_images_raw 须为 str 或 list，实际: {type(reference_images_raw).__name__}\"\
          \n        )\n\n    if isinstance(items, dict):\n        items = [items]\n\
          \    if not isinstance(items, list):\n        raise ValueError(\"解析结果须为\
          \ JSON 数组或单个对象\")\n\n    out: List[Dict[str, Any]] = []\n    for i, it in\
          \ enumerate(items):\n        out.append(_normalize_item(it, i))\n    return\
          \ {\"reference_images\": out}\n\n\n# # ========== Dify 粘贴区结束 ==========\n\
          \n\n# # ========== 本地自测（勿粘贴进 Dify） ==========\n# if __name__ == \"__main__\"\
          :\n#     assert main(\"\") == {\"reference_images\": []}\n#     assert main(\"\
          https://a.com/x.png\") == {\n#         \"reference_images\": [{\"image_url\"\
          : \"https://a.com/x.png\"}]\n#     }\n#     assert main('[{\"image_url\"\
          :\"https://b.com/1.jpg\"}]') == {\n#         \"reference_images\": [{\"\
          image_url\": \"https://b.com/1.jpg\"}]\n#     }\n#     assert main('{\"\
          image_url\":\"https://c.com/z.png\"}') == {\n#         \"reference_images\"\
          : [{\"image_url\": \"https://c.com/z.png\"}]\n#     }\n#     print(\"local\
          \ ok\")\n"
        code_language: python3
        outputs:
          reference_images:
            children: null
            type: array[object]
        selected: false
        title: 代码执行
        type: code
        variables:
        - value_selector:
          - '1774505608780'
          - reference_images
          value_type: string
          variable: reference_images_raw
      height: 52
      id: '1774518639409'
      position:
        x: 61.2426746791682
