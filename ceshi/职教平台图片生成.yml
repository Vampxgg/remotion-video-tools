    value: nudity, sexual content, gambling, drugs, gore, weapons, traditional Chinese
      characters, English text, watermark, Taiwan flag, political symbols, minors
      in inappropriate context, blurry, low resolution, deformed hands, extra fingers,
      distorted face, artifacts, noise, cropped, out of frame, English UI, English
